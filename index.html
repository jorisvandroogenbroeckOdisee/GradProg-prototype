        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [state, setState]         = useState({ xp:0, badges:[], completedModules:[], streak:0 });
  const [curModule, setCurModule] = useState(null);
  const [badgeToast, setBadgeToast] = useState(null);
  const [user, setUser]           = useState(null);   // { name, email, id, isTeacher }
  const [showLogin, setShowLogin] = useState(false);
  const [showTeacher, setShowTeacher] = useState(false);
  const [exportMsg, setExportMsg] = useState('');

  // Laad opgeslagen gebruiker + voortgang bij opstarten
  useEffect(() => {
    try {
      const savedUser = localStorage.getItem('algoflow_user');
      if (savedUser) {
        const u = JSON.parse(savedUser);
        setUser(u);
        const savedProgress = localStorage.getItem('algoflow_progress_' + u.id);
        if (savedProgress) setState(JSON.parse(savedProgress));
      }
    } catch(e) {}
  }, []);

  // Sla voortgang op bij elke wijziging (als ingelogd)
  useEffect(() => {
    if (!user) return;
    localStorage.setItem('algoflow_progress_' + user.id, JSON.stringify(state));
    // Registreer student in globale lijst voor docent
    try {
      const users = JSON.parse(localStorage.getItem('algoflow_users') || '[]');
      if (!users.find(u => u.id === user.id)) {
        users.push({ id: user.id, name: user.name, email: user.email });
        localStorage.setItem('algoflow_users', JSON.stringify(users));
      }
    } catch(e) {}
  }, [state, user]);

  const doLogin = (name, email) => {
    const id = 'demo_' + email.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    const isTeacher = TEACHER_EMAILS.includes(email.toLowerCase());
    const newUser = { name, email, id, isTeacher };
    setUser(newUser);
    localStorage.setItem('algoflow_user', JSON.stringify(newUser));
    // Herstel voortgang van bestaande sessie
    try {
      const saved = localStorage.getItem('algoflow_progress_' + id);
      if (saved) setState(JSON.parse(saved));
    } catch(e) {}
    setShowLogin(false);
  };

  const doLoginMicrosoft = async () => {
    if (IS_DEMO_MODE) { setShowLogin(true); return; }
    try {
      const msalApp = new msal.PublicClientApplication(MSAL_CONFIG);
      await msalApp.initialize();
      const result = await msalApp.loginPopup({ scopes:['openid','profile','email','User.Read'] });
      const email = result.account.username;
      const name  = result.account.name || email.split('@')[0];
      const id    = result.account.homeAccountId;
      const isTeacher = TEACHER_EMAILS.includes(email.toLowerCase());
      const newUser = { name, email, id, isTeacher };
      setUser(newUser);
      localStorage.setItem('algoflow_user', JSON.stringify(newUser));
      try {
        const saved = localStorage.getItem('algoflow_progress_' + id);
        if (saved) setState(JSON.parse(saved));
      } catch(e) {}
    } catch(err) { console.error('Login failed', err); }
  };

  const doLogout = () => {
    setUser(null);
    localStorage.removeItem('algoflow_user');
    setState({ xp:0, badges:[], completedModules:[], streak:0 });
  };

  const exportProgress = () => {
    if (!user) return;
    const data = btoa(JSON.stringify({ user:{ id:user.id, name:user.name, email:user.email }, progress:state }));
    navigator.clipboard.writeText(data).then(() => {
      setExportMsg('✓ Code gekopieerd!');
      setTimeout(() => setExportMsg(''), 2500);
    }).catch(() => {
      setExportMsg('⚠️ Kon niet kopiëren — gebruik Ctrl+C');
    });
  };

  const addXP = useCallback(amt => setState(s => ({...s, xp:s.xp+amt})), []);

  const earnBadge = useCallback(earnedBy => {
    const badge = BADGES.find(b => b.id===earnedBy || b.earnedBy===earnedBy);
    if (!badge) return;
    setState(s => {
      if (s.badges.includes(badge.id)) return s;
      setBadgeToast(badge);
      return {...s, badges:[...s.badges, badge.id]};
    });
  }, []);

  const completeModule = useCallback(id => {
    setState(s => {
      if (s.completedModules.includes(id)) return s;
      return {...s, completedModules:[...s.completedModules, id]};
    });
    addXP(100);
  }, [addXP]);

  const level = Math.floor(state.xp/200)+1;

  if (showTeacher && user?.isTeacher) {
    return (
      <div style={{minHeight:'100vh',background:'var(--bg)'}}>
        <div style={{background:'var(--navy)',borderBottom:'3px solid var(--mint)',
          padding:'0 32px',position:'sticky',top:0,zIndex:100,
          display:'flex',alignItems:'center',justifyContent:'space-between',height:60,
          boxShadow:'0 2px 12px rgba(31,65,107,.25)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{background:'var(--mint)',borderRadius:8,width:36,height:36,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontFamily:'Sora,sans-serif',fontWeight:900,fontSize:14,color:'#fff'}}>AF</div>
            <span style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:15,color:'#fff'}}>AlgoFlow</span>
          </div>
          <span style={{color:'rgba(255,255,255,.7)',fontSize:13}}>{user.name} · Docent</span>
        </div>
        <div className="content-wrap">
          <TeacherDashboard currentUser={user} onClose={() => setShowTeacher(false)}/>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* Nav – Odisee huisstijl */}
      <div style={{background:'var(--navy)',borderBottom:`3px solid var(--mint)`,
        padding:'0 24px',position:'sticky',top:0,zIndex:100,
        display:'flex',alignItems:'center',justifyContent:'space-between',height:60,
        boxShadow:'0 2px 12px rgba(31,65,107,.25)'}}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}} onClick={()=>setCurModule(null)}>
          <div style={{background:'var(--mint)',borderRadius:8,width:36,height:36,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontFamily:'Sora,sans-serif',fontWeight:900,fontSize:14,color:'#fff',letterSpacing:-.5,
            boxShadow:'0 2px 6px rgba(0,0,0,.2)'}}>AF</div>
          <div style={{display:'flex',flexDirection:'column',lineHeight:1.15}}>
            <span style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:15,color:'#fff',letterSpacing:-.2}}>AlgoFlow</span>
            <span style={{fontFamily:'DM Sans,sans-serif',fontWeight:400,fontSize:10,color:'rgba(255,255,255,.6)',letterSpacing:.4}}>Odisee · Programmeerfundamenten</span>
          </div>
        </div>
        {/* Rechts */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'var(--mint)',fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:13}}>⚡ {state.xp} XP</span>
          <div style={{background:'var(--mint)',borderRadius:6,padding:'3px 10px',
            fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,color:'#fff'}}>
            LVL {level}
          </div>
          <div style={{display:'flex',gap:4}}>
            {state.badges.slice(-3).map(id=>{const b=BADGES.find(ba=>ba.id===id);return b?<span key={id} title={b.name} style={{fontSize:15,cursor:'default'}}>{b.emoji}</span>:null;})}
          </div>
          {/* Auth sectie */}
          {user ? (
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {exportMsg && <span style={{fontSize:11,color:'var(--mint)',fontFamily:'Sora,sans-serif'}}>{exportMsg}</span>}
              <button onClick={exportProgress} title="Exporteer voortgang (voor docent)"
                style={{padding:'5px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.25)',
                  background:'transparent',color:'rgba(255,255,255,.8)',cursor:'pointer',fontSize:11,
                  fontFamily:'Sora,sans-serif'}}>
                📤 Export
              </button>
              {user.isTeacher && (
                <button onClick={() => setShowTeacher(true)}
                  style={{padding:'5px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.25)',
                    background:'rgba(255,255,255,.1)',color:'#fff',cursor:'pointer',fontSize:11,
                    fontFamily:'Sora,sans-serif',fontWeight:600}}>
                  👩‍🏫 Klas
                </button>
              )}
              <div style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.1)',
                borderRadius:20,padding:'4px 12px 4px 8px',cursor:'pointer'}}
                onClick={doLogout} title="Afmelden">
                <div style={{width:26,height:26,borderRadius:999,background:'var(--mint)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:11,color:'#fff'}}>
                  {user.name[0].toUpperCase()}
                </div>
                <span style={{color:'#fff',fontSize:12,fontFamily:'Sora,sans-serif',fontWeight:600,
                  maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {user.name.split(' ')[0]}
                </span>
              </div>
            </div>
          ) : (
            <button onClick={doLoginMicrosoft}
              style={{display:'flex',alignItems:'center',gap:7,padding:'6px 14px',
                borderRadius:8,border:'1px solid rgba(255,255,255,.3)',
                background:'rgba(255,255,255,.1)',color:'#fff',cursor:'pointer',
                fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:12,transition:'all .2s'}}>
              <svg width="14" height="14" viewBox="0 0 21 21" fill="none">
                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
              </svg>
              Aanmelden
            </button>
          )}
        </div>
      </div>

      {/* Content */}
      <div className="content-wrap">
        {curModule
          ? <ModulePage module={curModule} state={state} onBack={()=>setCurModule(null)}
              onXP={addXP} onBadge={earnBadge} onModuleComplete={completeModule}/>
          : <Dashboard state={state} modules={MODULES} onModule={setCurModule} user={user}/>}
      </div>

      {badgeToast && <BadgeToast badge={badgeToast} onDone={()=>setBadgeToast(null)}/>}
      {showLogin && <DemoLoginModal onLogin={doLogin} onClose={() => setShowLogin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
