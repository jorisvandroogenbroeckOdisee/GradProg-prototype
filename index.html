// Contextgevoelige tips — NOOIT het antwoord verklappen!
function generateHint(q, _selectedIdx) {
  if (q.type === 'trace') {
    return '📝 Neem pen en papier. Schrijf elke variabele op en voer de code STAP VOOR STAP uit met de gegeven waarden. Welke regels worden uitgevoerd? Wat verandert er per stap?';
  }
  if (q.type === 'fill') {
    const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
    const ans = answers[0];
    return `🔡 Het antwoord heeft precies ${ans.length} tekens. Het begint met "${ans.slice(0, Math.min(5, ans.length))}...". Python is hoofdlettergevoelig: 'P' ≠ 'p'.`;
  }
  if (q.type === 'mc') {
    const t = (q.q || '').toLowerCase();
    if (t.includes('symbool') || t.includes('flowchart')) return '🔷 Denk aan de VORM: ⬭ ovaal = start/stop, □ rechthoek = actie, ◇ ruit = beslissing, ▱ parallellogram = in/uitvoer.';
    if (t.includes('gehele deling') || t.includes('//') || t.includes('rest') || t.includes('modulo')) return '➗ / = echte deling (kan float geven), // = gehele deling (altijd int, geen rest), % = modulo (enkel de rest).';
    if (t.includes('return')) return '📤 "return" stuurt een waarde TERUG naar de aanroeper. Zonder return geeft een functie automatisch None terug.';
    if (t.includes('for') || t.includes('while') || t.includes('loop') || t.includes('lus') || t.includes('herhaal')) return '🔄 for-loop = voor een GEKEND aantal stappen. while-loop = zolang een CONDITIE True is (pas op: vergeet de update niet!).';
    if (t.includes('index') || t.includes('lijst') || t.includes('element')) return '📋 Python-indices starten bij 0. Eerste = lijst[0], laatste = lijst[-1] of lijst[len(lijst)-1].';
    if (t.includes('and') || t.includes('or') || t.includes('logisch')) return '🔗 "and" = beide condities moeten True zijn. "or" = minstens één True. "not" keert de waarde om.';
    if (t.includes('type') || t.includes('int') || t.includes('float') || t.includes('str')) return '📦 4 basistypes: int (hele getallen), float (kommagetallen), str (tekst), bool (True/False). Gebruik type() om te controleren.';
    if (t.includes('parameter') || t.includes('argument') || t.includes('functie') || t.includes('def')) return '🧩 Parameters staan tussen de haakjes van def. Ze zijn tijdelijke variabelen die hun waarde krijgen bij de aanroep.';
    if (t.includes('gevaar') || t.includes('oneindig')) return '⚠️ Een while-loop moet ALTIJD een manier hebben om te stoppen: de conditie moet op een moment False worden. Wat zorgt voor die verandering?';
    return '🔍 Lees de vraag opnieuw. Welk sleutelwoord geeft een hint? Raadpleeg indien nodig de theorie van dit module.';
  }
  return '💡 Bekijk de theorie-sectie van dit module nog eens voor dit onderwerp.';
}

// Shuffle + randomiseer elke ronde: volgorde vragen EN antwoordopties
function generateQuestions(quiz) {
  // Fisher-Yates shuffle
  const pool = [...quiz];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.map(q => {
    if (q.type === 'trace' && q.vals) {
      const vals = q.vals();
      const rawOpts = q.options(vals);
      const ans = q.answer(vals);
      // Shuffle trace-opties ook
      const opts = [...rawOpts].sort(() => Math.random() - 0.5);
      const ansIdx = opts.indexOf(ans);
      return { ...q, _vals:vals, _q:q.q(vals), _opts:opts, _ansStr:ans, _ansIdx: ansIdx >= 0 ? ansIdx : 0 };
    }
    if (q.type === 'mc') {
      // Shuffle MC-opties en update de antwoordindex
      const correctAnswer = q.options[q.answer];
      const shuffledOpts = [...q.options].sort(() => Math.random() - 0.5);
      return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswer) };
    }
    return q;
  });
}

function QuizSection({ module, onXP, onBadge, onComplete }) {
  const [quizKey, setQuizKey] = useState(0);
  const [questions, setQuestions] = useState(() => generateQuestions(module.quiz));
  const restart = () => { setQuestions(generateQuestions(module.quiz)); setQuizKey(k => k+1); };
  return <QuizInner key={quizKey} questions={questions}
    module={module} onXP={onXP} onBadge={onBadge} onRestart={restart} onComplete={onComplete} />;
}

function QuizInner({ questions, module, onXP, onBadge, onRestart, onComplete }) {
  const [cur, setCur] = useState(0);
  const [selected, setSelected] = useState(null);
  const [fillVal, setFillVal] = useState('');
  const [answered, setAnswered] = useState(false);
  const [correct, setCorrect] = useState(false);
  const [score, setScore] = useState({c:0,t:0});
  const [done, setDone] = useState(false);
  const [streak, setStreak] = useState(0);
  const [burst, setBurst] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [wasRetried, setWasRetried] = useState(false);
  const btnRef = useRef(null);

  const q = questions[cur];

  const getAnswerIdx = () => {
    if (q.type === 'mc')    return q.answer;
    if (q.type === 'trace') return q._ansIdx;
    return -1;
  };

  const checkAnswer = () => {
    if (answered) return;
    let isOk = false;
    if (q.type === 'fill') {
      const expected = Array.isArray(q.answer) ? q.answer : [q.answer];
      isOk = expected.some(a => fillVal.trim() === a.trim());
    } else {
      isOk = selected === getAnswerIdx();
    }
    setCorrect(isOk);
    setAnswered(true);
    const newStreak = isOk ? streak + 1 : 0;
    setStreak(newStreak);
    if (isOk) {
      setScore(s => ({c:s.c+1, t:s.t+1}));
      if (!wasRetried) {
        const rect = btnRef.current?.getBoundingClientRect();
        if (rect) setBurst({x:rect.left+40, y:rect.top});
        onXP(q.xp);
        if (score.c === 0 && cur === 0) onBadge('quiz_first');
        if (newStreak >= 3) onBadge('streak_3');
      }
    } else {
      setScore(s => ({...s, t:s.t+1}));
    }
  };

  const retry = () => {
    setSelected(null); setFillVal(''); setAnswered(false);
    setCorrect(false); setBurst(null); setShowHint(false);
    setWasRetried(true);
  };

  const next = () => {
    setSelected(null); setFillVal(''); setAnswered(false); setCorrect(false);
    setBurst(null); setShowHint(false); setWasRetried(false);
    if (cur < questions.length - 1) setCur(c => c+1);
    else {
      setDone(true);
      if (score.c === questions.length) onBadge('quiz_perfect');
      if (onComplete) onComplete();
    }
  };

  if (done) {
    const pct = Math.round((score.c / questions.length) * 100);
    return (
      <div className="fade-in" style={{textAlign:'center',padding:'40px 20px'}}>
        <div style={{fontSize:56,marginBottom:12}}>{pct>=80?'🎉':pct>=60?'👍':'💪'}</div>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:36,marginBottom:8}}>{pct}%</div>
        <div style={{color:'var(--text2)',marginBottom:28}}>{score.c} van {questions.length} correct</div>
        <div style={{maxWidth:360,margin:'0 auto 32px',height:12,background:'var(--bg3)',borderRadius:999,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:pct>=80?'#34D399':pct>=60?'#FCD34D':'#F87171',transition:'width .8s'}}/>
        </div>
        <button onClick={onRestart} style={{padding:'13px 32px',borderRadius:10,border:'none',
          background:module.color,color:'#000',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:16,cursor:'pointer'}}>
          🔄 Nieuwe ronde
        </button>
      </div>
    );
  }

  const opts = q.type === 'trace' ? q._opts : q.type === 'mc' ? q.options : null;
  const qText = q.type === 'trace' ? q._q : q.q;
  const ansIdx = getAnswerIdx();

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      {burst && <div style={{position:'fixed',left:burst.x,top:burst.y,zIndex:9999,pointerEvents:'none',
        animation:'xpGain .9s ease-out both',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:22,
        color:'#FCD34D',textShadow:'0 0 12px #FCD34D'}}>+{q.xp} XP</div>}

      {/* Progress dots */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:'var(--text3)',fontSize:13}}>Vraag {cur+1} / {questions.length}</span>
        <div style={{display:'flex',gap:6}}>
          {questions.map((_,i) => (
            <div key={i} style={{width:10,height:10,borderRadius:999,transition:'background .3s',
              background:i<cur?'#34D399':i===cur?module.color:'#1E2A3A'}}/>
          ))}
        </div>
        <span style={{color:'#FCD34D',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13}}>
          {wasRetried ? '(herpoging)' : `+${q.xp} XP`}
        </span>
      </div>

      {/* Question card */}
      <div style={{background:'var(--card)',
        border:`1px solid ${answered?(correct?'#34D39944':'#F8717144'):'var(--border)'}`,
        borderRadius:12,padding:24,transition:'border .3s'}}>
        <pre style={{fontFamily:'DM Sans,sans-serif',fontSize:15,lineHeight:1.75,color:'var(--text)',
          whiteSpace:'pre-wrap',marginBottom:20}}>{qText}</pre>

        {q.type === 'fill' ? (
          <input value={fillVal} onChange={e=>setFillVal(e.target.value)} disabled={answered}
            placeholder="Typ je antwoord hier..."
            onKeyDown={e=>e.key==='Enter'&&!answered&&checkAnswer()}
            style={{width:'100%',background:'var(--card)',
              border:`2px solid ${answered?(correct?'#34D399':'var(--red)'):'var(--border)'}`,
              borderRadius:8,padding:'12px 16px',color:'var(--text)',
              fontFamily:'Fira Code,monospace',fontSize:14,outline:'none'}}/>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {opts && opts.map((opt, i) => {
              const isRight = i === ansIdx;
              let bg = 'var(--bg3)', bdr = '1px solid var(--border)';
              if (!answered) {
                if (selected === i) { bg = `${module.color}22`; bdr = `1px solid ${module.color}`; }
              } else {
                if (isRight)             { bg = '#34D39922'; bdr = '1px solid #34D399'; }
                else if (selected === i) { bg = '#F8717122'; bdr = '1px solid #F87171'; }
              }
              return (
                <div key={i} onClick={()=>!answered&&setSelected(i)}
                  style={{padding:'12px 16px',borderRadius:8,border:bdr,background:bg,
                    cursor:answered?'default':'pointer',transition:'all .2s',
                    fontFamily:'Fira Code,monospace',fontSize:13,color:'var(--text)',
                    display:'flex',alignItems:'center',gap:8}}>
                  <span style={{color:'var(--text3)',minWidth:22}}>{String.fromCharCode(65+i)}.</span>
                  <span style={{flex:1}}>{opt}</span>
                  {answered && isRight && <span style={{color:'#34D399'}}>✓</span>}
                  {answered && selected===i && !isRight && <span style={{color:'#F87171'}}>✗</span>}
                </div>
              );
            })}
          </div>
        )}

        {answered && (
          <div className="fade-in" style={{marginTop:14,padding:'10px 14px',borderRadius:8,
            background:correct?'#34D39915':'#F8717115',
            border:`1px solid ${correct?'#34D39944':'#F8717144'}`}}>
            <span style={{fontFamily:'Sora,sans-serif',fontWeight:700,color:correct?'#34D399':'#F87171'}}>
              {correct ? (wasRetried ? '✓ Correct! (na herpoging — geen XP)' : '✓ Correct!') : '✗ Niet correct.'}
            </span>
          </div>
        )}

        {/* Hint box — shown on demand, never reveals the answer */}
        {showHint && (
          <div className="fade-in" style={{marginTop:10,padding:'12px 16px',borderRadius:8,
            background:'#FCD34D10',border:'1px solid #FCD34D33'}}>
            <span style={{color:'#FCD34D',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13}}>💡 Tip &nbsp;</span>
            <span style={{color:'var(--text2)',fontSize:13,lineHeight:1.6}}>{generateHint(q, selected)}</span>
          </div>
        )}
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',gap:10,flexWrap:'wrap'}}>
        {!answered ? (
          <button ref={btnRef} onClick={checkAnswer}
            disabled={q.type==='fill' ? !fillVal.trim() : selected===null}
            style={{padding:'12px 28px',borderRadius:10,border:'none',
              background:(q.type==='fill'?fillVal.trim():selected!==null)?module.color:'var(--bg3)',
              color:(q.type==='fill'?fillVal.trim():selected!==null)?'#000':'var(--text3)',
              fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14,
              cursor:(q.type==='fill'?fillVal.trim():selected!==null)?'pointer':'default',transition:'all .2s'}}>
            Controleer antwoord
          </button>
        ) : correct ? (
          <button onClick={next}
            style={{padding:'12px 28px',borderRadius:10,border:'none',
              background:module.color,color:'#000',fontFamily:'Sora,sans-serif',
              fontWeight:700,fontSize:14,cursor:'pointer'}}>
            {cur < questions.length-1 ? 'Volgende vraag →' : 'Resultaten bekijken 🎉'}
          </button>
        ) : (
          <>
            {!showHint && (
              <button onClick={()=>setShowHint(true)}
                style={{padding:'10px 18px',borderRadius:10,border:'1px solid #FCD34D55',
                  background:'#FCD34D12',color:'#FCD34D',fontFamily:'Sora,sans-serif',
                  fontWeight:700,fontSize:13,cursor:'pointer'}}>
                💡 Tip
              </button>
            )}
            <button onClick={retry}
              style={{padding:'10px 18px',borderRadius:10,border:'1px solid var(--border)',
                background:'var(--bg3)',color:'var(--text2)',fontFamily:'Sora,sans-serif',
                fontWeight:600,fontSize:13,cursor:'pointer'}}>
              🔄 Opnieuw proberen
            </button>
            <button onClick={next}
              style={{padding:'10px 22px',borderRadius:10,border:'none',
                background:module.color,color:'#000',fontFamily:'Sora,sans-serif',
                fontWeight:700,fontSize:13,cursor:'pointer'}}>
              {cur < questions.length-1 ? 'Overslaan →' : 'Resultaten bekijken 🎉'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

//  THEORY SECTION
// ══════════════════════════════════════════════════════════════════════════════
function TheorySection({ module, onReadAll }) {
  const [read, setRead] = useState(new Set());
  const toggle = i => {
    setRead(prev => {
      const next = new Set(prev);
      next.has(i) ? next.delete(i) : next.add(i);
      if (next.size === module.theory.length) onReadAll();
      return next;
    });
  };
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {module.theory.map((sec, i) => (
        <div key={i} onClick={()=>toggle(i)}
          style={{background:read.has(i)?`${module.color}08`:'var(--card)',
            border:`1px solid ${read.has(i)?module.color+'33':'var(--border)'}`,
            borderRadius:12,overflow:'hidden',cursor:'pointer',transition:'all .2s'}}>
          <div style={{padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:30,height:30,borderRadius:8,background:`${module.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:'Sora,sans-serif',fontWeight:700,color:module.color,fontSize:13}}>
                {i+1}
              </div>
              <span style={{fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:15}}>{sec.title}</span>
            </div>
            <span style={{color:read.has(i)?module.color:'var(--text3)',fontSize:16,transition:'color .2s'}}>
              {read.has(i)?'▾':'▸'}
            </span>
          </div>
          {read.has(i) && (
            <div className="fade-in" style={{padding:'0 18px 18px',borderTop:'1px solid var(--border)'}}>
              <p style={{color:'var(--text2)',lineHeight:1.75,marginTop:14,marginBottom:14,
                whiteSpace:'pre-line',fontSize:14}}>{sec.content}</p>
              <pre style={{background:'#080C14',border:'1px solid var(--border)',borderRadius:8,
                padding:'14px 16px',fontFamily:'Fira Code,monospace',fontSize:13,
                color:'#A8D8A8',lineHeight:1.65,whiteSpace:'pre-wrap',overflowX:'auto'}}>
                {sec.example}
              </pre>
            </div>
          )}
        </div>
      ))}
      <div style={{color:'var(--text3)',fontSize:13,textAlign:'center',paddingTop:4}}>
        {read.size}/{module.theory.length} secties gelezen — klik om te openen/sluiten
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  CONNECTION VIEW  –  flowchart ↔ code naast elkaar
// ══════════════════════════════════════════════════════════════════════════════
const FC_SYMBOLS = {terminal:'⬭',io:'▱',process:'▭',decision:'◇'};
const FC_COLORS  = {terminal:'#A78BFA',io:'#38BDF8',process:'#34D399',decision:'#FCD34D'};

function ConnectionView({ module }) {
  const [hovered, setHovered] = useState(null);
  const rawLines = (module.connectionCode || []).map((l, i) => ({ ...l, _idx: i }));
  const hasLines = rawLines.length > 0;

  // ── SVG layout constants ────────────────────────────────────────────────────
  const SVG_W  = 268;
  const MCX    = 134;          // main column center X
  const MX     = 18;           // main column left X
  const MW     = 232;          // main column width
  const YES_CX = 58;           // yes-branch center X
  const YES_X  = 8;            // yes-branch left X
  const YES_W  = 100;          // yes-branch width
  const NO_CX  = 210;          // no-branch center X
  const NO_X   = 160;          // no-branch left X
  const NO_W   = 100;          // no-branch width
  const NH     = 32;           // regular node height
  const DEC_H  = 46;           // decision diamond height
  const GAP    = 16;
  const JGAP   = 12;           // gap below diamond to junction

  // ── Shared helpers ──────────────────────────────────────────────────────────
  const trunc = (s, n = 19) => s.length > n ? s.slice(0, n - 1) + '…' : s;

  const nodePath = (type, x, y, w, h) => {
    const cx = x + w / 2, cy = y + h / 2, r = h / 2;
    if (type === 'terminal')
      return `M${x+r},${y} H${x+w-r} A${r},${r} 0 0 1 ${x+w-r},${y+h} H${x+r} A${r},${r} 0 0 1 ${x+r},${y} Z`;
    if (type === 'decision')
      return `M${cx},${y} L${x+w},${cy} L${cx},${y+h} L${x},${cy} Z`;
    if (type === 'io') { const sk = 8;
      return `M${x+sk},${y} L${x+w},${y} L${x+w-sk},${y+h} L${x},${y+h} Z`; }
    return `M${x+3},${y} H${x+w-3} Q${x+w},${y} ${x+w},${y+3} V${y+h-3} Q${x+w},${y+h} ${x+w-3},${y+h} H${x+3} Q${x},${y+h} ${x},${y+h-3} V${y+3} Q${x},${y} ${x+3},${y} Z`;
  };

  const arrowLine = (x1, y1, x2, y2, col, key) => (
    <g key={key}>
      <line x1={x1} y1={y1} x2={x2} y2={y2-6} stroke={col} strokeWidth={1.4}/>
      <polygon points={`${x2-5},${y2-6} ${x2+5},${y2-6} ${x2},${y2}`} fill={col}/>
    </g>
  );

  // ── Parse flat lines into branch-aware structure ────────────────────────────
  const parsed = useMemo(() => {
    const result = [];
    let i = 0;
    while (i < rawLines.length) {
      const l = rawLines[i];
      const code = l.code.trim();
      const isDecStart = l.type === 'decision' &&
        (code.startsWith('if ') || code.startsWith('while ') || code.startsWith('for '));
      const isElse = l.type === 'decision' &&
        (code.startsWith('else') || code.startsWith('elif'));

      if (isDecStart) {
        const item = { ...l, yesBranch: [], elseIdx: null, noBranch: [] };
        i++;
        while (i < rawLines.length && /^(\s{2,}|\t)/.test(rawLines[i].code)) {
          item.yesBranch.push(rawLines[i++]);
        }
        if (i < rawLines.length && rawLines[i].type === 'decision' &&
            (rawLines[i].code.trim().startsWith('else') || rawLines[i].code.trim().startsWith('elif'))) {
          item.elseIdx = rawLines[i]._idx;
          i++;
          while (i < rawLines.length && /^(\s{2,}|\t)/.test(rawLines[i].code)) {
            item.noBranch.push(rawLines[i++]);
          }
        }
        result.push(item);
      } else if (isElse) {
        i++; // else/elif already consumed above
      } else {
        result.push({ ...l, yesBranch: [], elseIdx: null, noBranch: [] });
        i++;
      }
    }
    return result;
  }, [rawLines]);

  // ── Compute SVG layout with positioned nodes ────────────────────────────────
  const layout = useMemo(() => {
    const nodes = []; // flat list of { x, y, w, nh, col, _idx, type, note, code, branchMeta? }
    let y = 10;

    for (const item of parsed) {
      const hasBranch = item.yesBranch.length > 0 || item.noBranch.length > 0;

      if (hasBranch) {
        // Main decision diamond
        nodes.push({ ...item, x:MX, y, w:MW, nh:DEC_H, col:'main' });
        const jY = y + DEC_H + JGAP;   // junction Y
        const branchStartY = jY + GAP;

        let yesEndY = branchStartY;
        item.yesBranch.forEach(b => {
          nodes.push({ ...b, x:YES_X, y:yesEndY, w:YES_W, nh:NH, col:'yes' });
          yesEndY += NH + GAP;
        });

        let noEndY = branchStartY;
        item.noBranch.forEach(b => {
          nodes.push({ ...b, x:NO_X, y:noEndY, w:NO_W, nh:NH, col:'no' });
          noEndY += NH + GAP;
        });

        const mergeY = Math.max(
          item.yesBranch.length ? yesEndY : branchStartY,
          item.noBranch.length ? noEndY  : branchStartY
        ) + GAP;

        // Store branch meta on the decision node (last added before yesBranch/noBranch)
        const decNode = nodes[nodes.length - 1 - item.yesBranch.length - item.noBranch.length];
        if (decNode) decNode.branchMeta = {
          jY, branchStartY,
          hasYes: item.yesBranch.length > 0,
          hasNo:  item.noBranch.length > 0,
          yesEndY: item.yesBranch.length ? yesEndY - GAP + NH : branchStartY,
          noEndY:  item.noBranch.length  ? noEndY  - GAP + NH : branchStartY,
          mergeY,
        };

        y = mergeY;
      } else {
        const nh = item.type === 'decision' ? DEC_H : NH;
        nodes.push({ ...item, x:MX, y, w:MW, nh, col:'main' });
        y += nh + GAP;
      }
    }

    return { nodes, svgH: y + 8 };
  }, [parsed]);

  // ── Render helpers ──────────────────────────────────────────────────────────
  const hovCol = (node) => FC_COLORS[node.type] || '#888';
  const isH = (node) => hovered === node._idx;

  const renderNode = (node, keyPfx) => {
    const col = hovCol(node);
    const h = isH(node);
    const cx = node.x + node.w / 2;
    const rawLbl = node.note || node.code.split('=')[0].trim().replace(/[():#]/g,'').trim() || node.code;
    const lbl = trunc(rawLbl, node.col === 'main' ? 24 : 14);
    const fontSize = node.col === 'main' ? 9 : 8;
    return (
      <g key={`${keyPfx}_${node._idx}`} style={{cursor:'default'}}
        onMouseEnter={() => setHovered(node._idx)}
        onMouseLeave={() => setHovered(null)}>
        <path d={nodePath(node.type, node.x, node.y, node.w, node.nh)}
          fill={h ? col+'22' : '#0a1020'}
          stroke={h ? col : col+'55'}
          strokeWidth={h ? 2 : 1.5}
          style={{transition:'all .15s'}}/>
        <text x={cx} y={node.y + node.nh / 2}
          textAnchor="middle" dominantBaseline="middle"
          fill={h ? col : '#8aa0b5'} fontSize={fontSize}
          fontFamily="Fira Code,monospace"
          style={{userSelect:'none', pointerEvents:'none', transition:'fill .15s'}}>
          {lbl}
        </text>
      </g>
    );
  };

  // Gather decision nodes to render their branch arrows
  const decisionNodes = layout.nodes.filter(n => n.branchMeta);

  return (
    <div>
      {/* Legenda */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12,
        background:'var(--bg3)',borderRadius:10,padding:'8px 14px',border:'1px solid var(--border)'}}>
        <span style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,color:'var(--text2)',marginRight:2}}>Legenda:</span>
        {[['terminal','⬭ Terminal'],['io','▱ I/O'],['process','▭ Actie'],['decision','◇ Beslissing']].map(([t,l])=>(
          <span key={t} style={{fontSize:11,fontFamily:'Fira Code,monospace',color:FC_COLORS[t]}}>{l}</span>
        ))}
      </div>

      {!hasLines && (
        <div style={{color:'var(--text3)',fontFamily:'Sora,sans-serif',fontSize:14,padding:20,textAlign:'center'}}>
          Geen verbindingsdata beschikbaar voor deze module.
        </div>
      )}

      {hasLines && (
        <div style={{display:'flex',gap:0,borderRadius:12,overflow:'hidden',border:'1px solid var(--border)',minHeight:200}}>

          {/* ── SVG Flowchart links ── */}
          <div style={{flex:'0 0 296px',background:'#080C14',padding:'12px 14px',
            borderRight:'1px solid var(--border)',overflowY:'auto',maxHeight:560}}>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,
              color:'var(--text3)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Flowchart</div>
            <svg width={SVG_W} height={layout.svgH} style={{display:'block',overflow:'visible'}}>

              {/* ── Straight arrows between sequential main-column nodes ── */}
              {(() => {
                const mainNodes = layout.nodes.filter(n => n.col === 'main' && !n.branchMeta);
                const allMain   = layout.nodes.filter(n => n.col === 'main');
                const lines2 = [];
                for (let i = 1; i < allMain.length; i++) {
                  const prev = allMain[i-1], curr = allMain[i];
                  if (!prev.branchMeta) {
                    const col = '#2d3f52';
                    lines2.push(arrowLine(MCX, prev.y+prev.nh, MCX, curr.y, col, `sa${i}`));
                  }
                }
                return lines2;
              })()}

              {/* ── Branch arrows from each decision ── */}
              {decisionNodes.map(dec => {
                const m = dec.branchMeta;
                const decCol = FC_COLORS[dec.type] || '#888';
                const arrows = [];

                // Arrow from bottom of diamond down to junction
                arrows.push(
                  <line key="jl" x1={MCX} y1={dec.y+DEC_H} x2={MCX} y2={m.jY}
                    stroke='#2d3f52' strokeWidth={1.4}/>
                );
                // Horizontal line at junction level
                const leftEnd  = m.hasYes ? YES_CX : MCX;
                const rightEnd = m.hasNo  ? NO_CX  : MCX;
                arrows.push(
                  <line key="jh" x1={leftEnd} y1={m.jY} x2={rightEnd} y2={m.jY}
                    stroke='#2d3f52' strokeWidth={1.4}/>
                );

                // Yes-branch arrow + label
                if (m.hasYes) {
                  arrows.push(arrowLine(YES_CX, m.jY, YES_CX, m.branchStartY, '#2d3f52', `ya`));
                  arrows.push(
                    <text key="jal" x={YES_CX} y={m.jY - 3}
                      textAnchor="middle" fontSize={8} fontFamily="Sora,sans-serif"
                      fill='#34D399' fontWeight="700">Ja</text>
                  );
                  // Merge arrow from yes-branch to center
                  arrows.push(
                    <g key="ym">
                      <line x1={YES_CX} y1={m.yesEndY} x2={YES_CX} y2={m.mergeY}
                        stroke='#2d3f52' strokeWidth={1.4}/>
                      <line x1={YES_CX} y1={m.mergeY} x2={MCX-1} y2={m.mergeY}
                        stroke='#2d3f52' strokeWidth={1.4}/>
                    </g>
                  );
                }

                // No-branch arrow + label
                if (m.hasNo) {
                  arrows.push(arrowLine(NO_CX, m.jY, NO_CX, m.branchStartY, '#2d3f52', `na`));
                  arrows.push(
                    <text key="jnar" x={NO_CX} y={m.jY - 3}
                      textAnchor="middle" fontSize={8} fontFamily="Sora,sans-serif"
                      fill='#F87171' fontWeight="700">Nee</text>
                  );
                  // Merge arrow from no-branch to center
                  arrows.push(
                    <g key="nm">
                      <line x1={NO_CX} y1={m.noEndY} x2={NO_CX} y2={m.mergeY}
                        stroke='#2d3f52' strokeWidth={1.4}/>
                      <line x1={NO_CX} y1={m.mergeY} x2={MCX+1} y2={m.mergeY}
                        stroke='#2d3f52' strokeWidth={1.4}/>
                    </g>
                  );
                }

                // Arrow from merge point to next main node
                const myMainIdx = layout.nodes.filter(n=>n.col==='main').findIndex(n=>n._idx===dec._idx);
                const nextMain  = layout.nodes.filter(n=>n.col==='main')[myMainIdx+1];
                if (nextMain) {
                  arrows.push(arrowLine(MCX, m.mergeY, MCX, nextMain.y, '#2d3f52', `ma`));
                }

                return <g key={`dec_${dec._idx}`}>{arrows}</g>;
              })}

              {/* ── All nodes (drawn after arrows so they appear on top) ── */}
              {layout.nodes.map(n => renderNode(n, 'n'))}
            </svg>
          </div>

          {/* ── Python-code rechts ── */}
          <div style={{flex:1,background:'#0D1117',padding:'14px 16px',overflowX:'auto',overflowY:'auto',maxHeight:560}}>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,
              color:'var(--text3)',marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>Python-code</div>
            {rawLines.map((l) => {
              const col = FC_COLORS[l.type] || '#888';
              const h = hovered === l._idx;
              return (
                <div key={l._idx}
                  onMouseEnter={() => setHovered(l._idx)}
                  onMouseLeave={() => setHovered(null)}
                  style={{padding:'4px 10px',marginBottom:2,borderRadius:6,cursor:'default',
                    background: h ? `${col}14` : 'transparent',
                    borderLeft:`3px solid ${h ? col : 'transparent'}`,
                    transition:'all .15s'}}>
                  <pre style={{margin:0,fontFamily:'Fira Code,monospace',fontSize:12,
                    color: h ? col : '#9aabb8',
                    lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>
                    {l.code}
                  </pre>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{marginTop:10,fontSize:11,color:'var(--text3)',fontFamily:'Sora,sans-serif',textAlign:'center'}}>
        Beweeg over een blok om de overeenkomst te zien · beslissingen tonen Ja/Nee-takken naast elkaar
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  EXERCISE SECTION — oefenzone per module
// ══════════════════════════════════════════════════════════════════════════════
function ExerciseSection({ module, onXP, onBadge }) {
  const exercises = EXERCISES[module.id] || [];
  const [curEx, setCurEx]       = useState(0);
  const [code, setCode]         = useState('');
  const [testRes, setTestRes]   = useState(null);
  const [running, setRunning]   = useState(false);
  const [passed, setPassed]     = useState({});   // exId → true/false
  const [showHint, setShowHint] = useState(false);

  // "Eigen invoer" tester (tekst-oefeningen)
  const [tryInput, setTryInput]   = useState('');
  const [tryOutput, setTryOutput] = useState(null);
  const [tryRunning, setTryRunning] = useState(false);
  const [tryError, setTryError]   = useState('');

  // Turtle canvas (visuele oefeningen)
  const turtleRef = useRef(null);
  const [turtleRunning, setTurtleRunning] = useState(false);
  const [turtleRan, setTurtleRan]         = useState(false);  // al minstens 1x gedraaid?

  const ex = exercises[curEx];

  useEffect(() => {
    if (ex) {
      setCode(ex.starter);
      setTestRes(null);
      setShowHint(false);
      setTryOutput(null);
      setTryError('');
      setTurtleRan(false);
    }
  }, [curEx, ex?.id]);

  const runTry = async () => {
    if (!ex || tryRunning) return;
    setTryRunning(true); setTryOutput(null); setTryError('');
    const inputs = tryInput.split('\n');
    let inputIdx = 0;
    const outLines = [];
    await new Promise(resolve => {
      Sk.configure({
        output: txt => { outLines.push(txt); },
        read: x => {
          if (Sk.builtinFiles?.files?.[x]) return Sk.builtinFiles.files[x];
          throw new Error(x + ': not found');
        },
        inputfun: () => Promise.resolve(inputs[inputIdx++] ?? ''),
        inputfunTakesPrompt: true,
        __future__: Sk.python3,
      });
      Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true))
        .then(resolve)
        .catch(e => { setTryError(e.tp$str ? e.tp$str().v : String(e)); resolve(); });
    });
    setTryOutput(outLines.join('') || '(geen uitvoer)');
    setTryRunning(false);
  };

  // Visuele oefening uitvoeren via turtle canvas
  const runVisual = async () => {
    if (!ex || turtleRunning || !turtleRef.current) return;
    setTurtleRunning(true);
    turtleRef.current.innerHTML = '';
    const cw = turtleRef.current.offsetWidth || 560;
    const ch = Math.max(cw, 480);
    Sk.TurtleGraphics = { target: turtleRef.current, width: cw, height: ch };
    Sk.configure({
      output: () => {},
      read: x => {
        if (Sk.builtinFiles?.files?.[x]) return Sk.builtinFiles.files[x];
        throw new Error(x + ': not found');
      },
      inputfun: () => Promise.resolve(''),
      inputfunTakesPrompt: true,
      __future__: Sk.python3,
    });
    await new Promise(resolve => {
      Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true))
        .then(resolve).catch(resolve);
    });
    setTurtleRunning(false);
    setTurtleRan(true);
  };

  const markVisualDone = () => {
    if (!ex || passed[ex.id]) return;
    setPassed(p => ({ ...p, [ex.id]: true }));
    onXP(15);
    if (Object.keys(passed).length + 1 >= exercises.length) onBadge('exercise_pass');
  };

  const runTests = async () => {
    if (!ex || running) return;
    setRunning(true); setTestRes(null);
    const results = [];
    for (const t of ex.tests) {
      const inputs = t.input ? t.input.split('\n') : [];
      let inputIdx = 0;
      const outLines = [];
      await new Promise(resolve => {
        Sk.configure({
          output: txt => { outLines.push(txt); },
          read: x => {
            if (Sk.builtinFiles?.files?.[x]) return Sk.builtinFiles.files[x];
            throw new Error(x + ': not found');
          },
          inputfun: () => Promise.resolve(inputs[inputIdx++] ?? ''),
          inputfunTakesPrompt: true,   // voorkomt dat Skulpt de prompt via output() stuurt
          __future__: Sk.python3,
        });
        Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true))
          .then(resolve).catch(resolve);
      });
      const actual   = outLines.join('').replace(/\n$/, '').trim();
      const expected = t.output.trim();
      results.push({ input: t.input, expected, actual, ok: actual === expected });
    }
    setTestRes(results);
    const allOk = results.every(r => r.ok);
    if (allOk && !passed[ex.id]) {
      setPassed(p => ({ ...p, [ex.id]: true }));
      onXP(15);
      if (Object.keys(passed).length + 1 >= exercises.length) onBadge('exercise_pass');
    }
    setRunning(false);
  };

  if (!ex) return <div style={{color:'var(--text3)',padding:20,textAlign:'center'}}>Geen oefeningen beschikbaar.</div>;

  const doneCount = exercises.filter(e => passed[e.id]).length;

  return (
    <div>
      {/* Voortgang */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,color:'var(--text2)'}}>
          🎯 Oefeningen — {doneCount}/{exercises.length} voltooid
        </div>
        <div style={{height:8,flex:'1 1 200px',background:'var(--bg3)',borderRadius:999,overflow:'hidden',maxWidth:300}}>
          <div style={{height:'100%',width:`${(doneCount/exercises.length)*100}%`,
            background:`linear-gradient(90deg,${module.color},${module.color}bb)`,borderRadius:999,transition:'width .5s'}}/>
        </div>
      </div>

      {/* Oefening-tabs */}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {exercises.map((e, i) => {
          const done = passed[e.id];
          const active = curEx === i;
          return (
            <button key={e.id} onClick={() => setCurEx(i)}
              style={{padding:'6px 14px',borderRadius:8,cursor:'pointer',fontFamily:'Sora,sans-serif',
                fontWeight:600,fontSize:12,transition:'all .15s',
                border:`1.5px solid ${active ? module.color : done ? module.color+'55' : 'var(--border)'}`,
                background: active ? `${module.color}18` : done ? `${module.color}08` : 'var(--card)',
                color: active ? module.color : done ? module.color+'cc' : 'var(--text2)'}}>
              {done ? '✅ ' : ''}{e.title.split(' ').slice(0, 3).join(' ')}
            </button>
          );
        })}
      </div>

      {/* Oefening kaart */}
      <div style={{background:'var(--card)',border:`1px solid ${module.color}33`,
        borderRadius:12,padding:18,marginBottom:14}}>
        <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:16,marginBottom:8,color:module.color}}>
          {ex.title}
        </h3>
        <p style={{color:'var(--text2)',fontSize:14,lineHeight:1.65,marginBottom:0}}>{ex.desc}</p>
        {ex.hint && (
          <div style={{marginTop:10}}>
            <button onClick={() => setShowHint(h => !h)}
              style={{padding:'4px 12px',borderRadius:6,border:`1px solid ${module.color}55`,
                background:'transparent',color:module.color,fontSize:12,fontFamily:'Sora,sans-serif',
                fontWeight:600,cursor:'pointer'}}>
              {showHint ? '🙈 Verberg hint' : '💡 Toon hint'}
            </button>
            {showHint && (
              <div style={{marginTop:8,background:`${module.color}0f`,
                borderLeft:`3px solid ${module.color}`,borderRadius:'0 8px 8px 0',
                padding:'8px 12px',fontSize:13,color:'var(--text2)',fontFamily:'Fira Code,monospace'}}>
                {ex.hint}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Code editor */}
      <div style={{background:'#080C14',borderRadius:12,overflow:'hidden',marginBottom:12,
        border:'1px solid var(--border)'}}>
        <div style={{background:'#0D1117',padding:'9px 16px',borderBottom:'1px solid #1a2a3a',
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',gap:6}}>
            <div style={{width:11,height:11,borderRadius:999,background:'#F87171'}}/>
            <div style={{width:11,height:11,borderRadius:999,background:'#FCD34D'}}/>
            <div style={{width:11,height:11,borderRadius:999,background:'#34D399'}}/>
          </div>
          <span style={{fontFamily:'Fira Code,monospace',fontSize:11,color:'var(--text3)'}}>oefening_{curEx+1}.py</span>
          <span style={{fontSize:11,color:'var(--text3)',fontFamily:'Sora,sans-serif'}}>Python</span>
        </div>
        <textarea value={code} onChange={e => setCode(e.target.value)} spellCheck={false}
          style={{width:'100%',minHeight:200,background:'transparent',border:'none',outline:'none',
            padding:'16px 20px',fontFamily:'Fira Code,monospace',fontSize:13,
            color:'#A8D8A8',lineHeight:1.7,resize:'vertical',tabSize:4}}/>
      </div>

      {/* ── VISUELE oefening (turtle) ── */}
      {ex.visual ? (
        <div>
          {/* Turtle canvas */}
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,
            padding:14,marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,color:'#34D399'}}>
                🐢 Turtle-canvas
              </span>
              <button onClick={runVisual} disabled={turtleRunning}
                style={{padding:'6px 18px',borderRadius:8,border:'none',
                  cursor:turtleRunning?'default':'pointer',
                  background:turtleRunning?'var(--bg3)':'#7C3AED',color:'#fff',
                  fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
                  display:'flex',alignItems:'center',gap:6}}>
                {turtleRunning
                  ? <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span>
                  : '▶'}
                {turtleRunning ? 'Loopt...' : '▶ Uitvoeren'}
              </button>
            </div>
            <div ref={turtleRef}
              style={{background:'#fff',borderRadius:8,width:'100%',minHeight:200,overflow:'auto'}}/>
          </div>

          {/* Self-assessment */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
            {passed[ex.id] ? (
              <span style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,color:'#34D399'}}>
                ✅ Oefening afgevinkt! +15 XP
              </span>
            ) : (
              <button onClick={markVisualDone} disabled={!turtleRan}
                title={!turtleRan ? 'Voer de code eerst uit' : ''}
                style={{padding:'7px 20px',borderRadius:8,border:'none',
                  cursor:turtleRan?'pointer':'default',
                  background:turtleRan?'var(--mint)':'var(--bg3)',
                  color:turtleRan?'#fff':'var(--text3)',
                  fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12}}>
                ✅ Ziet er goed uit! Markeer als klaar (+15 XP)
              </button>
            )}
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>
          {!turtleRan && (
            <p style={{textAlign:'center',fontSize:11,color:'var(--text3)',
              fontFamily:'Sora,sans-serif',marginTop:-8,marginBottom:12}}>
              Voer de code eerst uit om de tekening te beoordelen.
            </p>
          )}
        </div>
      ) : (
        <>
          {/* ── Eigen invoer testen (tekst-oefeningen) ── */}
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,
            padding:14,marginBottom:12}}>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
              color:'var(--text2)',marginBottom:8}}>
              🧪 Test met eigen invoer
              <span style={{fontFamily:'Fira Code,monospace',fontWeight:400,color:'var(--text3)',
                fontSize:11,marginLeft:8}}>
                (meerdere inputs? gebruik nieuwe regels)
              </span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <textarea
                value={tryInput}
                onChange={e => { setTryInput(e.target.value); setTryOutput(null); setTryError(''); }}
                placeholder={'invoerwaarde\ntwee inputs? één per regel'}
                spellCheck={false}
                rows={Math.max(1, tryInput.split('\n').length)}
                style={{flex:'1 1 0',background:'var(--bg2)',border:'1px solid var(--border)',
                  borderRadius:8,padding:'8px 12px',fontFamily:'Fira Code,monospace',fontSize:12,
                  color:'var(--text)',outline:'none',resize:'vertical',lineHeight:1.6,minHeight:36}}/>
              <button onClick={runTry} disabled={tryRunning}
                style={{padding:'8px 16px',borderRadius:8,border:'none',cursor:tryRunning?'default':'pointer',
                  background:tryRunning?'var(--bg3)':'#7C3AED',color:'#fff',
                  fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
                  display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap',flexShrink:0}}>
                {tryRunning
                  ? <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span>
                  : '▶'}
                {tryRunning ? 'Loopt...' : 'Uitproberen'}
              </button>
            </div>
            {(tryOutput !== null || tryError) && (
              <div style={{marginTop:10,background:'#080C14',borderRadius:8,padding:'10px 14px',
                fontFamily:'Fira Code,monospace',fontSize:12,lineHeight:1.7}}>
                {tryError
                  ? <span style={{color:'#F87171'}}>⚠️ {tryError}</span>
                  : <pre style={{margin:0,color:'#A8D8A8',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                      {tryOutput}
                    </pre>
                }
              </div>
            )}
          </div>

          {/* Scheidingslijn + controleer-knop */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
            <button onClick={runTests} disabled={running}
              style={{padding:'7px 20px',borderRadius:8,border:'none',cursor:running?'default':'pointer',
                background:running?'var(--bg3)':'var(--mint)',color:'#fff',
                fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
                display:'flex',alignItems:'center',gap:6}}>
              {running
                ? <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span>
                : '▶▶'}
              {running ? 'Testen...' : '▶▶ Controleer alle testscenarios'}
            </button>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>
        </>
      )}

      {/* Testresultaten (alleen tekst-oefeningen) */}
      {!ex.visual && testRes && (
        <div style={{borderRadius:12,overflow:'hidden',border:'1px solid var(--border)'}}>
          <div style={{background:testRes.every(r=>r.ok)?'#1a3a2a':'#3a1a1a',
            padding:'10px 16px',borderBottom:'1px solid var(--border)',
            fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,
            color:testRes.every(r=>r.ok)?'#34D399':'#F87171'}}>
            {testRes.every(r=>r.ok) ? '🎉 Alle testen geslaagd! +15 XP' : `${testRes.filter(r=>r.ok).length}/${testRes.length} testen geslaagd`}
          </div>
          {testRes.map((r, i) => (
            <div key={i} style={{padding:'10px 16px',borderBottom:i<testRes.length-1?'1px solid var(--border)':'none',
              background:r.ok?'#0d1f15':'#1f0d0d'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:14}}>{r.ok ? '✅' : '❌'}</span>
                <span style={{fontFamily:'Fira Code,monospace',fontSize:11,color:r.ok?'#34D399':'#F87171',fontWeight:700}}>
                  Test {i+1}{r.input ? ` (invoer: "${r.input.replace(/\n/g,'↵')}")` : ''}
                </span>
              </div>
              <div style={{marginLeft:22,fontSize:11,fontFamily:'Fira Code,monospace',color:'var(--text3)'}}>
                {r.ok ? (
                  <span style={{color:'#86efac'}}>▶ uitvoer: "{r.actual}"</span>
                ) : (
                  <>
                    <span style={{color:'#F87171'}}>Gekregen:  </span><span style={{color:'#fca5a5'}}>"{r.actual}"</span><br/>
                    <span style={{color:'#34D399'}}>Verwacht: </span><span style={{color:'#86efac'}}>"{r.expected}"</span>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODULE PAGE
// ══════════════════════════════════════════════════════════════════════════════
function ModulePage({ module, state, onBack, onXP, onBadge, onModuleComplete }) {
  const [tab, setTab] = useState('theorie');
  const [theoryDone, setTheoryDone] = useState(false);
  const [codeRuns, setCodeRuns]     = useState(0);
  const [quizDone, setQuizDone]     = useState(false);
  const [showUnlock, setShowUnlock] = useState(false);

  const curIdx    = MODULES.findIndex(m => m.id === module.id);
  const nextModule = MODULES[curIdx + 1] || null;

  const handleCodeRun = () => {
    const r = codeRuns + 1;
    setCodeRuns(r);
    onXP(15);
    if (r >= 3) onBadge('code_3');
  };

  const handleQuizComplete = () => {
    if (!quizDone) {
      setQuizDone(true);
      onBadge('module_complete');
      onModuleComplete(module.id);
      setShowUnlock(true);   // toon unlockmelding
    }
  };

  // ── Module-unlock modal ───────────────────────────────────────────────────
  const UnlockModal = () => (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:2000,
      display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e => e.target===e.currentTarget && setShowUnlock(false)}>
      <div className="fade-in" style={{
        background:'linear-gradient(145deg,var(--navy),var(--navy2))',
        border:'2px solid var(--mint)',borderRadius:20,padding:'36px 40px',
        width:440,maxWidth:'92vw',textAlign:'center',
        boxShadow:'0 12px 48px rgba(0,0,0,.4), 0 0 0 1px rgba(60,180,151,.2)'}}>
        {/* Confetti-achtig accent */}
        <div style={{fontSize:52,marginBottom:12}}>🎉</div>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:22,color:'#fff',marginBottom:6}}>
          {module.emoji} {module.title} voltooid!
        </div>
        <div style={{color:'rgba(255,255,255,.65)',fontSize:14,marginBottom:28,lineHeight:1.6}}>
          Geweldig werk — je hebt de zelftest gehaald en +100 XP verdiend.
        </div>

        {nextModule ? (
          <>
            <div style={{background:'rgba(60,180,151,.15)',border:'1px solid rgba(60,180,151,.4)',
              borderRadius:14,padding:'16px 20px',marginBottom:24}}>
              <div style={{color:'var(--mint)',fontFamily:'Sora,sans-serif',fontWeight:700,
                fontSize:12,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>
                🔓 Nieuwe module vrijgespeeld
              </div>
              <div style={{fontSize:28,marginBottom:4}}>{nextModule.emoji}</div>
              <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:17,
                color:'#fff',marginBottom:4}}>{nextModule.title}</div>
              <div style={{color:'rgba(255,255,255,.55)',fontSize:12}}>{nextModule.week} · {nextModule.hours}u</div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
              <button onClick={() => setShowUnlock(false)}
                style={{padding:'11px 22px',borderRadius:10,border:'1px solid rgba(255,255,255,.25)',
                  background:'transparent',color:'rgba(255,255,255,.75)',
                  fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:14,cursor:'pointer'}}>
                Blijf hier
              </button>
              <button onClick={onBack}
                style={{padding:'11px 28px',borderRadius:10,border:'none',
                  background:'var(--mint)',color:'#fff',
                  fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer',
                  boxShadow:'0 4px 14px rgba(60,180,151,.4)'}}>
                Naar {nextModule.title} →
              </button>
            </div>
          </>
        ) : (
          <>
            <div style={{background:'rgba(255,215,0,.1)',border:'1px solid rgba(255,215,0,.3)',
              borderRadius:14,padding:'16px 20px',marginBottom:24}}>
              <div style={{fontSize:36,marginBottom:8}}>🏆</div>
              <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:16,color:'#FFD700',marginBottom:4}}>
                Alle modules afgerond!
              </div>
              <div style={{color:'rgba(255,255,255,.6)',fontSize:13}}>
                Je bent klaar voor de evaluatieweek. Proficiat!
              </div>
            </div>
            <button onClick={onBack}
              style={{padding:'11px 28px',borderRadius:10,border:'none',
                background:'var(--mint)',color:'#fff',
                fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer'}}>
              Terug naar dashboard
            </button>
          </>
        )}
      </div>
    </div>
  );

  const tabs = [
    {id:'theorie',   label:'📖 Theorie'},
    {id:'flowchart', label:'🔷 Flowchart'},
    {id:'verbinding',label:'🔗 Verbinding'},
    {id:'code',      label:'🐍 Python'},
    {id:'oefeningen',label:'🎯 Oefeningen'},
    {id:'zelftest',  label:'✅ Zelftest'},
  ];

  return (
    <div className="fade-in" style={{maxWidth:1200,margin:'0 auto'}}>
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:8,background:'transparent',
        border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',color:'var(--text2)',
        cursor:'pointer',marginBottom:22,fontSize:14,fontFamily:'DM Sans,sans-serif'}}>
        ← Terug
      </button>

      <div style={{background:`linear-gradient(135deg,${module.color}12,var(--card))`,
        border:`1px solid ${module.color}33`,borderRadius:16,padding:'26px 30px',marginBottom:22}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{color:'var(--text3)',fontSize:13,marginBottom:4}}>{module.week} · {module.hours} contacturen</div>
            <h1 style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:26,marginBottom:8}}>
              <span style={{fontSize:30,marginRight:10}}>{module.emoji}</span>{module.title}
            </h1>
            <p style={{color:'var(--text2)',fontSize:14}}>{module.tagline}</p>
          </div>
        </div>
      </div>

      <div style={{display:'flex',gap:4,marginBottom:22,background:'var(--bg2)',
        borderRadius:12,padding:4,border:'1px solid var(--border)'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:'10px 6px',borderRadius:8,border:'none',
              background:tab===t.id?'var(--card)':'transparent',
              color:tab===t.id?module.color:'var(--text3)',
              fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:13,cursor:'pointer',transition:'all .2s',
              boxShadow:tab===t.id?'0 2px 8px rgba(0,0,0,.3)':'none'}}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==='theorie'    && <TheorySection module={module} onReadAll={()=>{setTheoryDone(true);onBadge('theory_all');onXP(30);}}/>}
      {tab==='flowchart'  && <FlowchartSection module={module}/>}
      {tab==='code'       && <CodeSection module={module} onRun={handleCodeRun}/>}
      {tab==='verbinding' && <ConnectionView module={module}/>}
      {tab==='oefeningen' && <ExerciseSection module={module} onXP={onXP} onBadge={onBadge}/>}
      {tab==='zelftest'   && <QuizSection module={module} onXP={onXP} onBadge={onBadge} onComplete={handleQuizComplete}/>}

      {showUnlock && <UnlockModal/>}
    </div>
  );
}

//  TEACHER DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function TeacherDashboard({ currentUser, onClose }) {
  const [students, setStudents]   = useState([]);
  const [importCode, setImportCode] = useState('');
  const [importErr, setImportErr]   = useState('');
  const [selStudent, setSelStudent] = useState(null);

  const loadStudents = () => {
    const users = JSON.parse(localStorage.getItem('algoflow_users') || '[]');
    const withProgress = users
      .filter(u => !TEACHER_EMAILS.includes(u.email))
      .map(u => ({
        ...u,
        progress: (() => { try { return JSON.parse(localStorage.getItem('algoflow_progress_' + u.id) || '{}'); } catch(e) { return {}; } })()
      }));
    setStudents(withProgress);
  };

  useEffect(loadStudents, []);

  const doImport = () => {
    setImportErr('');
    try {
      const data = JSON.parse(atob(importCode.trim()));
      if (!data.user || !data.progress) throw new Error('Ongeldige structuur');
      const users = JSON.parse(localStorage.getItem('algoflow_users') || '[]');
      if (!users.find(u => u.id === data.user.id)) {
        users.push(data.user);
        localStorage.setItem('algoflow_users', JSON.stringify(users));
      }
      localStorage.setItem('algoflow_progress_' + data.user.id, JSON.stringify(data.progress));
      setImportCode('');
      loadStudents();
    } catch(e) {
      setImportErr('⚠️ Ongeldige code. Vraag de student om opnieuw te exporteren.');
    }
  };

  const moduleLabels = ['M1 I/O','M2 Vars','M3 If','M4 Lussen','M5 Lijsten','M6 Functies'];

  return (
    <div className="fade-in" style={{maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <h1 style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:24}}>
          👩‍🏫 Klasoverzicht
        </h1>
        <button onClick={onClose}
          style={{padding:'8px 18px',borderRadius:8,border:'1px solid var(--border)',
            background:'transparent',color:'var(--text2)',cursor:'pointer',fontSize:14}}>
          ← Terug
        </button>
      </div>

      {/* Importeer voortgang */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:20,marginBottom:20}}>
        <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:15,marginBottom:8}}>
          📥 Voortgang importeren
        </h3>
        <p style={{color:'var(--text2)',fontSize:13,marginBottom:12,lineHeight:1.6}}>
          Studenten kunnen hun voortgang exporteren (via knop in de navigatiebalk). Plak de exportcode hieronder om hun voortgang toe te voegen.
        </p>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <input value={importCode} onChange={e=>setImportCode(e.target.value)}
            placeholder="Plak exportcode hier…"
            style={{flex:'1 1 300px',padding:'10px 14px',borderRadius:8,border:'1px solid var(--border)',
              background:'var(--card)',color:'var(--text)',fontFamily:'Fira Code,monospace',fontSize:13,outline:'none'}}/>
          <button onClick={doImport} disabled={!importCode.trim()}
            style={{padding:'10px 20px',borderRadius:8,border:'none',cursor:'pointer',
              background:importCode.trim()?'var(--mint)':'var(--bg3)',
              color:importCode.trim()?'#fff':'var(--text3)',
              fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13}}>
            Importeer
          </button>
        </div>
        {importErr && <div style={{color:'var(--red-od)',fontSize:12,marginTop:8}}>{importErr}</div>}
      </div>

      {/* Tabel studenten */}
      {students.length === 0 ? (
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,
          padding:40,textAlign:'center',color:'var(--text3)'}}>
          <div style={{fontSize:36,marginBottom:12}}>👨‍🎓</div>
          <div style={{fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:15,marginBottom:8}}>Nog geen studenten</div>
          <div style={{fontSize:13,lineHeight:1.6}}>
            Studenten verschijnen hier nadat ze ingelogd zijn op dezelfde browser, of nadat je hun exportcode importeert.
          </div>
        </div>
      ) : (
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)'}}>
                <th style={{padding:'12px 16px',textAlign:'left',fontFamily:'Sora,sans-serif',fontWeight:700,color:'var(--text2)'}}>Student</th>
                <th style={{padding:'12px 16px',textAlign:'left',fontFamily:'Sora,sans-serif',fontWeight:700,color:'var(--text2)'}}>XP</th>
                {moduleLabels.map(l => (
                  <th key={l} style={{padding:'12px 8px',textAlign:'center',fontFamily:'Sora,sans-serif',fontWeight:700,color:'var(--text2)',fontSize:11}}>{l}</th>
                ))}
                <th style={{padding:'12px 16px'}}></th>
              </tr>
            </thead>
            <tbody>
              {students.map((s, i) => {
                const p = s.progress;
                const completed = p.completedModules || [];
                return (
                  <tr key={s.id} style={{borderBottom:i<students.length-1?'1px solid var(--border)':'none',
                    background:selStudent===s.id?'var(--bg2)':'transparent'}}>
                    <td style={{padding:'12px 16px'}}>
                      <div style={{fontFamily:'Sora,sans-serif',fontWeight:600,color:'var(--text)'}}>{s.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>{s.email}</div>
                    </td>
                    <td style={{padding:'12px 16px',fontFamily:'Fira Code,monospace',fontWeight:700,color:'var(--mint)'}}>
                      {p.xp || 0}
                    </td>
                    {[1,2,3,4,5,6].map(id => (
                      <td key={id} style={{padding:'12px 8px',textAlign:'center'}}>
                        {completed.includes(id)
                          ? <span style={{color:'#34D399',fontSize:16}}>✓</span>
                          : <span style={{color:'var(--border)',fontSize:14}}>·</span>}
                      </td>
                    ))}
                    <td style={{padding:'12px 16px'}}>
                      <button onClick={()=>setSelStudent(selStudent===s.id?null:s.id)}
                        style={{padding:'4px 10px',borderRadius:6,border:'1px solid var(--border)',
                          background:'transparent',color:'var(--text3)',cursor:'pointer',fontSize:11}}>
                        Detail
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Geselecteerde student detail */}
      {selStudent && (() => {
        const s = students.find(x => x.id === selStudent);
        if (!s) return null;
        const p = s.progress;
        return (
          <div style={{marginTop:16,background:'var(--card)',border:`1px solid var(--mint)44`,
            borderRadius:12,padding:20}}>
            <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:15,marginBottom:12,color:'var(--mint)'}}>
              Detailrapport — {s.name}
            </h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10}}>
              {[['⚡ XP', p.xp||0,'var(--mint)'],
                ['🏅 Badges', (p.badges||[]).length,'var(--navy)'],
                ['✅ Modules', (p.completedModules||[]).length+'/6','var(--storm)'],
              ].map(([lbl,val,col])=>(
                <div key={lbl} style={{background:'var(--bg2)',borderRadius:10,padding:'12px 14px'}}>
                  <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>{lbl}</div>
                  <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:20,color:col}}>{val}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Info backend */}
      <div style={{marginTop:20,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:16}}>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,marginBottom:6}}>
          ℹ️ Opmerking over gegevensbeheer
        </div>
        <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7,margin:0}}>
          De voortgang van studenten wordt lokaal opgeslagen. Studenten die dezelfde browser/computer gebruiken als jij verschijnen automatisch hier. Voor volledige cross-device synchronisatie heb je een backend nodig (bijv. Azure Functions + Cosmos DB). Vraag de IT-dienst om een Azure Static Web App te configureren.
        </p>
      </div>
    </div>
  );
}

function ProgressBar({ value, max, color='#00E5C3', height=8 }) {
  const pct = Math.min(100,(value/max)*100);
  return (
    <div style={{background:'var(--bg3)',borderRadius:999,height,overflow:'hidden',position:'relative'}}>
      <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color},${color}bb)`,
        borderRadius:999,transition:'width .6s cubic-bezier(.4,0,.2,1)',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:'-100%',width:'60%',height:'100%',
          background:'linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent)',animation:'shine 2s infinite'}}/>
      </div>
    </div>
  );
}

function Dashboard({ state, modules, onModule, user }) {
  const level = Math.floor(state.xp / 200) + 1;
  const xpCur = state.xp - (level-1)*200;
  const xpMax = 200;
  const titles = ['','Beginner Programmeur','Junior Coder','Algo Ninja','Code Meester','Python Master'];
  const title = level <= 5 ? titles[level] : 'Code Legende';

  return (
    <div className="fade-in">
      {/* Hero — Odisee navy */}
      <div style={{background:'linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%)',borderRadius:16,
        padding:'28px 32px',marginBottom:24,position:'relative',overflow:'hidden',
        boxShadow:'0 4px 20px rgba(31,65,107,.25)'}}>
        {/* decoratief cirkel-accent */}
        <div style={{position:'absolute',top:-60,right:-60,width:260,height:260,borderRadius:999,
          background:'radial-gradient(circle,rgba(60,180,151,.18) 0%,transparent 70%)',pointerEvents:'none'}}/>
        {user && (
          <div style={{position:'absolute',top:16,right:16,
            background:'rgba(255,255,255,.12)',borderRadius:8,padding:'4px 12px',
            color:'rgba(255,255,255,.85)',fontSize:12,fontFamily:'Sora,sans-serif'}}>
            👋 Welkom, {user.name.split(' ')[0]}
          </div>
        )}
        <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:14}}>
          <div style={{background:'var(--mint)',borderRadius:12,
            padding:'10px 16px',fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:20,color:'#fff',
            minWidth:52,textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,.2)'}}>
            {level}
          </div>
          <div>
            <div style={{color:'rgba(255,255,255,.65)',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:2}}>Niveau</div>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:20,color:'#fff'}}>{title}</div>
          </div>
        </div>
        <div style={{maxWidth:380,marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12,color:'rgba(255,255,255,.65)'}}>
            <span>{xpCur}/{xpMax} XP</span><span>Niveau {level+1}</span>
          </div>
          <ProgressBar value={xpCur} max={xpMax} color='#3cb497' height={10}/>
        </div>
        <div style={{color:'rgba(255,255,255,.6)',fontSize:13}}>
          Totaal: {state.xp} XP · {state.badges.length} badges · {state.completedModules.length} modules
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:28}}>
        {[['⚡','XP',state.xp,'var(--mint)'],['🏅','Badges',`${state.badges.length}/${BADGES.length}`,'var(--navy)'],
          ['📚','Modules',`${state.completedModules.length}/6`,'var(--storm)'],['🔥','Streak',state.streak,'var(--orange)']].map(([icon,label,val,col])=>(
          <div key={label} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,
            padding:'14px 16px',boxShadow:'0 2px 8px rgba(31,65,107,.06)'}}>
            <div style={{color:'var(--text3)',fontSize:12,marginBottom:4}}>{icon} {label}</div>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:24,color:col}}>{val}</div>
          </div>
        ))}
      </div>

      {/* Module grid */}
      <h2 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:19,marginBottom:14}}>📘 Modules</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:16,marginBottom:28}}>
        {modules.map((mod, i) => {
          const locked = i > 0 && !state.completedModules.includes(modules[i-1].id);
          const completed = state.completedModules.includes(mod.id);
          return (
            <div key={mod.id} onClick={()=>!locked&&onModule(mod)}
              style={{background:'var(--card)',border:`1px solid ${completed?mod.color+'44':'var(--border)'}`,
                borderRadius:16,padding:22,cursor:locked?'not-allowed':'pointer',opacity:locked?.5:1,
                transition:'all .25s',position:'relative',overflow:'hidden'}}
              onMouseEnter={e=>{ if(!locked){e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow=`0 10px 30px ${mod.color}20`;} }}
              onMouseLeave={e=>{ e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none'; }}>
              {completed && <div style={{position:'absolute',top:10,right:10,background:'#34D39922',border:'1px solid #34D39944',borderRadius:999,padding:'2px 9px',color:'#34D399',fontSize:11,fontFamily:'Sora,sans-serif',fontWeight:700}}>✓</div>}
              {locked && <div style={{position:'absolute',top:10,right:10,fontSize:15}}>🔒</div>}
              <div style={{fontSize:32,marginBottom:10}}>{mod.emoji}</div>
              <div style={{color:'var(--text3)',fontSize:12,marginBottom:3}}>{mod.week}</div>
              <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:16,marginBottom:6,color:mod.color}}>{mod.title}</h3>
              <p style={{color:'var(--text2)',fontSize:13,lineHeight:1.6,marginBottom:14}}>{mod.tagline}</p>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <span style={{background:`${mod.color}18`,color:mod.color,borderRadius:999,padding:'2px 9px',fontSize:11,fontFamily:'Sora,sans-serif',fontWeight:600}}>{mod.hours}u</span>
                <span style={{background:'var(--bg3)',color:'var(--text3)',borderRadius:999,padding:'2px 9px',fontSize:11}}>{mod.quiz.length} zelftests</span>
              </div>
            </div>
          );
        })}
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:22,opacity:.45}}>
          <div style={{position:'relative',display:'inline-block'}}><div style={{fontSize:32,marginBottom:10}}>📝</div><span style={{position:'absolute',top:-4,right:-4,fontSize:12}}>🔒</span></div>
          <div style={{color:'var(--text3)',fontSize:12,marginBottom:3}}>Week 7</div>
          <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:16,marginBottom:6,color:'var(--text2)'}}>Evaluatieweek</h3>
          <p style={{color:'var(--text3)',fontSize:13,lineHeight:1.6}}>Praktische proef + flowchart-component. Beschikbaar na alle modules.</p>
        </div>
      </div>

      {/* Badges */}
      <h2 style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:19,marginBottom:14}}>🏅 Badges</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:10}}>
        {BADGES.map(badge => {
          const earned = state.badges.includes(badge.id);
          return (
            <div key={badge.id} style={{background:'var(--card)',border:`1px solid ${earned?'#9B5CF644':'var(--border)'}`,
              borderRadius:12,padding:16,opacity:earned?1:.35,transition:'all .3s',
              ...(earned?{boxShadow:'0 0 16px rgba(155,92,246,.15)'}:{})}}>
              <div style={{fontSize:28,filter:earned?'none':'grayscale(1)',marginBottom:8}}>{badge.emoji}</div>
              <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,color:earned?'var(--text)':'var(--text3)',marginBottom:4}}>{badge.name}</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>{badge.desc}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

//  BADGE TOAST
// ══════════════════════════════════════════════════════════════════════════════
function BadgeToast({ badge, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,
      background:'linear-gradient(135deg,var(--navy),var(--navy2))',
      border:'2px solid var(--mint)',borderRadius:16,padding:'18px 26px',
      display:'flex',alignItems:'center',gap:14,
      animation:'badgePop .5s ease-out both',
      boxShadow:'0 8px 36px rgba(31,65,107,.4)'}}>
      <span style={{fontSize:44}}>{badge.emoji}</span>
      <div>
        <div style={{color:'var(--mint)',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:2}}>Badge verdiend!</div>
        <div style={{color:'#fff',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:17}}>{badge.name}</div>
        <div style={{color:'rgba(255,255,255,.7)',fontSize:12}}>{badge.desc}</div>
      </div>
    </div>
  );
}

    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,
      display:'flex',alignItems:'center',justifyContent:'center'}}

      <div className="fade-in" style={{background:'var(--card)',borderRadius:16,padding:32,
        width:400,maxWidth:'90vw',border:'1px solid var(--border)',boxShadow:'0 8px 36px rgba(0,0,0,.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>

        {[['Naam', name, setName, 'Joris Janssen'],['E-mail', email, setEmail, 'student@student.odisee.be']].map(([lbl,val,set,ph]) => (
          <div key={lbl} style={{marginBottom:14}}>

              color:'var(--text2)',marginBottom:5}}>{lbl}</label>
            <input value={val} onChange={e=>set(e.target.value)}
              placeholder={ph}
              style={{width:'100%',padding:'10px 14px',borderRadius:8,
                border:'1px solid var(--border)',background:'var(--card)',
                color:'var(--text)',fontFamily:'DM Sans,sans-serif',fontSize:14,outline:'none'}}/>

              background:valid?'#0078D4':'var(--bg3)',color:valid?'#fff':'var(--text3)',
