    theory:[
      { title:"Wat is een algoritme?", content:"Een algoritme is een eindige reeks precieze instructies om een probleem op te lossen. Net als een recept beschrijft het EXACT wat gedaan moet worden en IN WELKE VOLGORDE.", example:"Algoritme: 'Maak thee'\n1. Zet de waterkoker aan\n2. Wacht tot het water kookt\n3. Giet water in de kop\n4. Doe een theezakje in\n5. Wacht 3 minuten\n6. Haal het zakje eruit\n→ De VOLGORDE is cruciaal!" },
      { title:"Flowchart-symbolen", content:"Een flowchart is een visuele voorstelling van een algoritme. Er zijn 5 standaardsymbolen:", example:"⬭  OVAAL          → Start / Stop\n□  RECHTHOEK      → Actie/berekening\n◇  RUIT            → Beslissing (Ja/Nee)\n▱  PARALLELOGRAM   → Invoer/Uitvoer\n→  PIJL            → Richting van de stroom" },
      { title:"Waarom flowcharts?", content:"Flowcharts helpen je DENKEN voor je programmeert. Ze dwingen je om elke stap te benoemen en beslissingen bewust te maken.", example:"Tip: Een goede programmeur besteedt 70% van de tijd aan nadenken en schetsen, slechts 30% aan typen." },
      { title:"Invoer en uitvoer in Python", content:"Een programma communiceert via INVOER (wat de gebruiker intypt) en UITVOER (wat het programma toont). In Python gebruik je:\n• input() — vraagt iets aan de gebruiker\n• print() — toont iets op het scherm\n\nDit zijn de twee basisacties voor communicatie met de buitenwereld. In een flowchart stellen ze het parallelogram ▱ voor.", example:"# Uitvoer: toon iets op het scherm\nprint('Hallo wereld!')          # → Hallo wereld!\nprint('2 + 2 =', 2 + 2)         # → 2 + 2 = 4\n\n# Invoer: vraag iets aan de gebruiker\nnaam = input('Wat is jouw naam? ')\nprint('Hallo,', naam)" },
      { title:"Wat is een string?", content:"Een string (str) is een stuk TEKST in Python. Je herkent het aan aanhalingstekens — enkel of dubbel. Elke letter, cijfer of spatie daartussen is deel van de tekst.\n\nBelangrijk: '42' is NIET hetzelfde als 42! De eerste is tekst, de tweede is een getal waarmee je kunt rekenen.", example:"# Strings maken\ngroeting = 'Hallo Joris'\nzin = \"Python is leuk!\"\n\n# Tekst samenvoegen (concatenatie) met +\nprint('Hallo' + ' ' + 'wereld')   # Hallo wereld\n\n# Strings herhalen met *\nprint('-' * 20)   # --------------------\n\n# Let op het verschil:\nprint('42' + '8')   # → 428   (tekst!)\nprint(42   +  8)    # → 50    (getal!)" },
      { title:"Invoer inlezen & type-conversie", content:"input() geeft ALTIJD een string terug, ook als de gebruiker een getal intypt. Als je wilt rekenen, moet je die string omzetten naar een getal met int() of float().", example:"# input() geeft altijd str terug:\ntekst = input('Getal: ')    # Stel: '42'\n\n# str kan je niet optellen bij een getal:\n# print(tekst + 10)  → FOUT!\n\n# Omzetten naar int (geheel getal):\nn = int(input('Getal: '))    # 42\n\n# Omzetten naar float (kommagetal):\nprijs = float(input('Prijs: '))   # 9.99\n\n# Controleer zelf:\nprint(type('42'))    # <class 'str'>\nprint(type(42))      # <class 'int'>\nprint(type(9.99))    # <class 'float'>" },

      { title:"Datatypes", content:"Python heeft 4 basistypes:\n• int   – gehele getallen (1, 42, -7)\n• float – kommagetallen (3.14, -0.5)\n• str   – tekst ('hallo')\n• bool  – True of False", example:"type(42)     → int\ntype(3.14)   → float\ntype('hi')   → str\ntype(True)   → bool" },
      { title:"Rekenkundige operatoren", content:"Python volgt de wiskundige volgorde (PEMDAS).", example:"a, b = 10, 3\nprint(a + b)   # 13\nprint(a - b)   # 7\nprint(a * b)   # 30\nprint(a / b)   # 3.333\nprint(a // b)  # 3  (gehele deling)\nprint(a % b)   # 1  (rest)\nprint(a ** b)  # 1000 (macht)" },
      { title:"F-strings", content:"F-strings laten je variabelen netjes in tekst verwerken.", example:"naam = 'Joris'\nleeftijd = 18\nprint(f'Hallo {naam}, je bent {leeftijd} jaar.')\n# → 'Hallo Joris, je bent 18 jaar.'\n\nprijs = 9.5\nprint(f'Totaal: {prijs * 2:.2f} euro')\n# → 'Totaal: 19.00 euro'" },
      { title:"Type-conversie: int(), float(), str()", content:"Je kunt waarden omzetten van het ene type naar het andere. Dit is essentieel bij input() (levert altijd str) en bij het mixen van getallen en tekst.", example:"# str → int of float\nn = int('42')         # 42\nx = float('3.14')     # 3.14\n\n# Veel gebruikte combinatie:\nleeftijd = int(input('Leeftijd: '))\nprijs    = float(input('Prijs:    '))\n\n# Getal → str (voor concatenatie)\nresultaat = 'De prijs is ' + str(prijs)\n\n# Opsomming van conversies:\nint(3.9)   # → 3   (afkappen, niet afronden)\nfloat(5)   # → 5.0\nstr(42)    # → '42'\nbool(0)    # → False\nbool(1)    # → True" },
    ],

    id:3, title:"Selectie (If/Elif/Else)", emoji:"🔀", color:"#FF6D35",
    week:"Week 3", hours:6, tagline:"Laat je programma beslissingen nemen",
    theory:[
      { title:"Selectie: if en else", content:"Een programma moet soms een keuze maken afhankelijk van een conditie. Dat heet selectie. De eenvoudigste vorm is if/else: als de conditie True is, wordt het eerste blok uitgevoerd, anders het else-blok.\n\nLet op de inspringing (indentatie) van 4 spaties — Python gebruikt dit om te weten welke code bij de if hoort.", example:"# Basis if/else\nleeftijd = int(input('Leeftijd: '))\n\nif leeftijd >= 18:\n    print('Je bent meerderjarig.')\n    print('Je mag stemmen.')\nelse:\n    print('Je bent minderjarig.')\n    print('Nog even wachten.')\n\n# Enkel if (geen else verplicht)\nscore = float(input('Score: '))\nif score >= 10:\n    print('Gefeliciteerd, geslaagd!')\n# als score < 10: niets bijzonders" },
      { title:"Meer keuzes: elif", content:"Soms heb je meer dan twee paden. Gebruik elif (else if) voor extra voorwaarden. Python controleert ze van boven naar beneden en stopt bij de eerste die True is.\n\nElif mag je zoveel keer herhalen als nodig. De else aan het einde is optioneel maar handig als 'anders'-geval.", example:"score = float(input('Score (0-20): '))\n\nif score >= 16:\n    print('Onderscheiding!')\nelif score >= 14:\n    print('Verdienste')\nelif score >= 10:\n    print('Voldoende')\nelse:\n    print('Onvoldoende — probeer opnieuw')\n\n# Hoe werkt het?\n# Python checkt van boven:\n#   score=17 → 17>=16 → 'Onderscheiding!' → STOP\n#   score=12 → 12<16, 12<14, 12>=10 → 'Voldoende'\n#   score=8  → geen enkel pad True → 'Onvoldoende'" },
      { title:"Vergelijkingsoperatoren", content:"Een conditie vergelijkt twee waarden en geeft True of False terug. Er zijn zes vergelijkingsoperatoren. Let op het verschil tussen = (toewijzing) en == (vergelijking)!", example:"# Alle zes vergelijkingsoperatoren:\na, b = 7, 10\n\nprint(a == b)   # False   — gelijk aan?\nprint(a != b)   # True    — niet gelijk?\nprint(a <  b)   # True    — kleiner dan?\nprint(a >  b)   # False   — groter dan?\nprint(a <= b)   # True    — kleiner of gelijk?\nprint(a >= b)   # False   — groter of gelijk?\n\n# Vergelijking geeft altijd bool terug:\nresultaat = (a < b)\nprint(type(resultaat))   # <class 'bool'>\nprint(resultaat)         # True\n\n# Veelgemaakte fout:\nx = 5\nif x = 10:   # FOUT! Dit is toewijzing, niet vergelijking\nif x == 10:  # CORRECT" },
      { title:"Logische operatoren: and, or, not", content:"Met logische operatoren combineer je meerdere condities tot één grote conditie. Zo kun je complexere regels uitdrukken.\n\n• and  — allebei moeten True zijn\n• or   — minstens één moet True zijn\n• not  — keert True/False om", example:"# AND — beide condities True?\nleeftijd = 20\nticket = True\n\nif leeftijd >= 18 and ticket:\n    print('Welkom aan boord!')\nelse:\n    print('Toegang geweigerd.')\n\n# OR — minstens één True?\ndag = 'zaterdag'\nif dag == 'zaterdag' or dag == 'zondag':\n    print('Weekend!')\nelse:\n    print('Weekdag — werken maar.')\n\n# NOT — keert om\ngeregistreerd = False\nif not geregistreerd:\n    print('Meld je eerst aan.')\n\n# Combinatie met haakjes:\nx = 15\nif (x > 10 and x < 20) or x == 0:\n    print('x ligt tussen 10 en 20, of is nul.')\n\n# Waarheidstabel and/or:\n# True  and True  → True\n# True  and False → False\n# False and True  → False\n# True  or  False → True\n# False or  False → False" },

//  PYTHON — via Skulpt (echte CPython-compatibele interpreter in de browser)
// ══════════════════════════════════════════════════════════════════════════════
function extractInputCalls(code) {
  const re = /input\s*\(([^)]*)\)/g;
  const prompts = [];
  let m;
  while ((m = re.exec(code)) !== null) {
    const raw = m[1].trim().replace(/^['"`]|['"`]$/g,'') || 'Waarde:';
    prompts.push(raw);
  }
  return prompts;
}

// Legacy stub — kept so older quiz traces still compile; real execution uses Skulpt in CodeSection
function runPython(code) {
  const output = [];
  const vars = {};
  let lineCount = 0;
  const MAX = 300;

  function toNum(v) { const n = parseFloat(v); return isNaN(n) ? v : n; }

  function evalExpr(expr) {
    expr = expr.trim();
    if (!expr) return '';

    // f-string
    if (/^f['"]/.test(expr)) {
      const q = expr[1];
      const inner = expr.slice(2, expr.lastIndexOf(q));
      return inner.replace(/\{([^}]+)\}/g, (_, part) => {
        const [e, fmt] = part.split(':');
        let val = evalExpr(e.trim());
        if (fmt) {
          const m = fmt.match(/(\d*)([dfsf<>^])/);
          if (m) {
            const width = parseInt(m[1]) || 0;
            const spec = m[2];
            if (spec === 'f') { const dec = parseInt(fmt) || 2; val = parseFloat(val).toFixed(dec); }
            else if (spec === 'd') { val = Math.floor(parseFloat(val)); }
            else if (spec === '<') { val = String(val).padEnd(width); }
            else if (spec === '>') { val = String(val).padStart(width); }
          }
        }
        return val === undefined ? '' : val;
      });
    }

    // Quoted string (single or double, multichar)
    if (/^(['"]).*\1$/.test(expr)) return expr.slice(1,-1);

    // True/False/None
    if (expr === 'True') return true;
    if (expr === 'False') return false;
    if (expr === 'None') return null;

    // int(), float(), str(), len(), sum(), round(), min(), max()
    const fnMatch = expr.match(/^(\w+)\((.+)\)$/s);
    if (fnMatch) {
      const [, fn, arg] = fnMatch;
      const v = evalExpr(arg);
      if (fn === 'int')   return Math.floor(parseFloat(v)) || 0;
      if (fn === 'float') return parseFloat(v) || 0;
      if (fn === 'str')   return String(v);
      if (fn === 'len')   return Array.isArray(v) ? v.length : String(v).length;
      if (fn === 'sum')   return Array.isArray(v) ? v.reduce((a,b)=>a+b,0) : 0;
      if (fn === 'min')   return Array.isArray(v) ? Math.min(...v) : v;
      if (fn === 'max')   return Array.isArray(v) ? Math.max(...v) : v;
      if (fn === 'round') {
        const parts = arg.split(',');
        const num = parseFloat(evalExpr(parts[0]));
        const dec = parts[1] ? parseInt(evalExpr(parts[1])) : 0;
        return parseFloat(num.toFixed(dec));
      }
      if (fn === 'range') {
        const parts = arg.split(',').map(p => parseInt(evalExpr(p.trim())));
        const [a,b,s] = parts.length===1?[0,parts[0],1]:parts.length===2?[parts[0],parts[1],1]:parts;
        const arr = []; for(let i=a;i<b;i+=s) arr.push(i); return arr;
      }
      if (fn === 'list') return Array.isArray(v) ? v : [];
      if (fn === 'abs')  return Math.abs(parseFloat(v));
    }

    // List literal
    if (expr.startsWith('[') && expr.endsWith(']')) {
      const inner = expr.slice(1,-1).trim();
      if (!inner) return [];
      return inner.split(',').map(p => evalExpr(p.trim()));
    }

    // String concatenation
    if (expr.includes(' + ') && (expr.includes('"') || expr.includes("'"))) {
      return expr.split(' + ').map(p => evalExpr(p.trim())).join('');
    }

    // Numeric expression
    if (/^[\d\s+\-*/(). ,a-zA-Z_]+$/.test(expr)) {
      const substituted = expr.replace(/[a-zA-Z_]\w*/g, id => {
        if (['True','False','None'].includes(id)) return id === 'True' ? 'true' : id === 'False' ? 'false' : 'null';
        return vars[id] !== undefined ? JSON.stringify(vars[id]) : 'undefined';
      });
      try { return Function('"use strict"; return (' + substituted.replace(/\*\*/g,'**') + ')')(); }
      catch(e) {}
    }

    // Variable lookup
    if (/^[a-zA-Z_]\w*(\[[-\d]+\])?$/.test(expr)) {
      const idxMatch = expr.match(/^([a-zA-Z_]\w*)\[([-\d]+)\]$/);
      if (idxMatch) {
        const arr = vars[idxMatch[1]];
        if (Array.isArray(arr)) { let i = parseInt(idxMatch[2]); if(i<0) i=arr.length+i; return arr[i]; }
      }
      return vars[expr] !== undefined ? vars[expr] : expr;
    }

    // Fallback
    try {
      const s = expr.replace(/[a-zA-Z_]\w*/g, id => vars[id] !== undefined ? JSON.stringify(vars[id]) : '0');
      return Function('"use strict"; return (' + s + ')')();
    } catch(e) {}
    return expr;
  }

  function execLines(lines, depth=0) {
    let i = 0;
    while (i < lines.length && lineCount < MAX) {
      lineCount++;
      const raw = lines[i];
      const line = raw.trimStart();
      const indent = raw.length - line.length;

      if (!line || line.startsWith('#') || line.startsWith('import') || line.startsWith('from') || line.includes('turtle') || line.startsWith('def ')) { i++; continue; }

      // print
      if (line.startsWith('print(')) {
        const inner = line.replace(/^print\s*\(/, '').replace(/\)\s*$/, '');
        const val = evalExpr(inner);
        output.push(val === null ? 'None' : String(val));
        i++; continue;
      }

      // augmented assignment
      const augMatch = line.match(/^([a-zA-Z_]\w*)\s*(\+=|-=|\*=|\/=|\/\/=|%=)\s*(.+)$/);
      if (augMatch) {
        const [, name, op, expr] = augMatch;
        const v = evalExpr(expr);
        const cur = vars[name] || 0;
        if (op==='+=') vars[name] = (typeof cur==='string'||typeof v==='string') ? String(cur)+String(v) : cur+v;
        else if (op==='-=') vars[name] = cur - v;
        else if (op==='*=') vars[name] = cur * v;
        else if (op==='/=') vars[name] = cur / v;
        else if (op==='//=') vars[name] = Math.floor(cur / v);
        else if (op==='%=') vars[name] = cur % v;
        i++; continue;
      }

      // simple assignment (no if/for/while prefix)
      const assignMatch = line.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/) ;
      if (assignMatch && !line.startsWith('if') && !line.startsWith('elif') && !line.startsWith('while') && !line.startsWith('for') && !line.startsWith('else')) {
        const [, name, expr] = assignMatch;
        vars[name] = evalExpr(expr);
        i++; continue;
      }

      // for loop
      if (line.startsWith('for ')) {
        const forMatch = line.match(/^for\s+(\w+)\s+in\s+(.+):$/);
        if (forMatch) {
          const [, loopVar, iterExpr] = forMatch;
          const iterable = evalExpr(iterExpr);
          const body = [];
          const baseIndent = indent;
          let j = i + 1;
          while (j < lines.length && (lines[j].trimStart() === '' || (lines[j].length - lines[j].trimStart().length) > baseIndent)) {
            body.push(lines[j]);
            j++;
          }
          if (Array.isArray(iterable)) {
            for (const val of iterable) {
              if (lineCount >= MAX) break;
              vars[loopVar] = val;
              execLines(body.map(l => l.slice(4)), depth+1);
            }
          }
          i = j; continue;
        }
      }

      // while loop
      if (line.startsWith('while ')) {
        const whileMatch = line.match(/^while\s+(.+):$/);
        if (whileMatch) {
          const condExpr = whileMatch[1];
          const body = [];
          const baseIndent = indent;
          let j = i + 1;
          while (j < lines.length && (lines[j].trimStart() === '' || (lines[j].length - lines[j].trimStart().length) > baseIndent)) {
            body.push(lines[j]);
            j++;
          }
          let guard = 0;
          while (guard++ < 200 && lineCount < MAX) {
            const cond = evalExpr(condExpr);
            if (!cond && cond !== 0) break;
            execLines(body.map(l => l.slice(4 > baseIndent+4 ? 4 : baseIndent+4)), depth+1);
          }
          i = j; continue;
        }
      }

      // if/elif/else
      if (line.startsWith('if ') || line.startsWith('elif ') || line.startsWith('else:')) {
        // Collect the if-elif-else chain
        const chain = [];
        let j = i;
        while (j < lines.length) {
          const l = lines[j].trimStart();
          const li = lines[j].length - l.length;
          if (li !== indent && j > i) break;
          let cond = null;
          let body = [];
          if (l.startsWith('if ') || l.startsWith('elif ')) {
            cond = l.replace(/^(if|elif)\s+/, '').replace(/:$/, '');
          } else if (l.startsWith('else:')) {
            cond = null; // else
          } else if (j > i) { break; }
          // collect body
          let k = j + 1;
          while (k < lines.length && (lines[k].trimStart() === '' || (lines[k].length - lines[k].trimStart().length) > indent)) {
            body.push(lines[k]);
            k++;
          }
          chain.push({ cond, body });
          j = k;
        }
        // Execute first matching branch
        let executed = false;
        for (const branch of chain) {
          if (executed) break;
          if (branch.cond === null || executed) {
            if (!executed) { execLines(branch.body.map(l => l.slice(4 > indent+4 ? 4 : indent+4)), depth+1); executed = true; }
            else execLines(branch.body.map(l => l.slice(4 > indent+4 ? 4 : indent+4)), depth+1);
          } else {
            const result = evalExpr(branch.cond);
            if (result) {
              execLines(branch.body.map(l => l.slice(4 > indent+4 ? 4 : indent+4)), depth+1);
              executed = true;
            }
          }
        }
        i = j; continue;
      }

      i++;
    }
  }

  try { execLines(code.split('\n')); }
  catch(e) { output.push('❌ Fout: ' + e.message); }
  return output.length > 0 ? output.join('\n') : '(geen uitvoer)';
}

// ══════════════════════════════════════════════════════════════════════════════
//  SVG FLOWCHART RENDERER
// ══════════════════════════════════════════════════════════════════════════════
function wrapLabel(text, maxChars=16) {
  if (text.length <= maxChars) return [text];
  const words = text.split(' ');
  const lines = []; let cur = '';
  for (const w of words) {
    if ((cur+' '+w).trim().length > maxChars && cur) { lines.push(cur.trim()); cur = w; }
    else cur = (cur+' '+w).trim();
  }
  if (cur) lines.push(cur.trim());
  return lines;
}

function FlowchartSVG({ flowNodes, activeIds=[], doneIds=[], color='#00E5C3', width=640 }) {
  if (!flowNodes || flowNodes.length === 0) return <text fill="#666" x="50" y="50">Geen flowchart</text>;

  const SVG_W = width;
  const CX = SVG_W / 2;
  const LX = 90;  // yes-branch center x
  const RX = SVG_W - 90; // no-branch center x
  const GAP = 40;

  const DIM = {
    terminal:{ w:130, h:42 },
    process: { w:175, h:50 },
    io:      { w:175, h:50 },
    decision:{ w:170, h:80, hw:85, hh:40 },
  };

  const elems = [];   // { type, id, cx, cy, w, h, label, nodeType }
  const arrows = [];  // { d, arrowEnd, label, labelX, labelY, fromId, toId }
  let y = 25;

  function addNode(node, cx) {
    const d = DIM[node.type] || DIM.process;
    const cy = y + d.h / 2;
    elems.push({ ...d, ...node, cx, cy, nodeType: node.type });
    const top = y; const bot = y + d.h;
    y += d.h;
    return { top, bot, cy, d };
  }

  function arrowDown(x, fromY, toY, fromId, toId) {
    if (fromY >= toY) return;
    arrows.push({ d:`M${x},${fromY} L${x},${toY}`, arrowEnd:true, fromId, toId });
  }

  let prevBot = null, prevId = null;

  for (let i = 0; i < flowNodes.length; i++) {
    const node = flowNodes[i];
    if (node.type === 'decision') {
      if (prevBot !== null) arrowDown(CX, prevBot + 4, y + 4, prevId, node.id);
      const pos = addNode(node, CX);
      prevBot = null; prevId = node.id;
      const decMidY = pos.cy;
      const decBot = pos.bot;
      const d = DIM.decision;

      const branchTopY = decBot + GAP;
      let yesBot = branchTopY, noBot = branchTopY;

      const yesBranch = node.yesBranch || [];
      const noBranch  = node.noBranch  || [];

      // Yes branch (left)
      let yy = branchTopY;
      let prevYesBot = null, prevYesId = null;
      for (const yn of yesBranch) {
        if (prevYesBot !== null) arrowDown(LX, prevYesBot + 4, yy + 4, prevYesId, yn.id);
        const yd = DIM[yn.type] || DIM.process;
        const ync = yy + yd.h / 2;
        elems.push({ ...yd, ...yn, cx: LX, cy: ync, nodeType: yn.type });
        prevYesBot = yy + yd.h; prevYesId = yn.id;
        yy += yd.h + (GAP * 0.6);
      }
      yesBot = yy;

      // No branch (right)
      let ny = branchTopY;
      let prevNoBot = null, prevNoId = null;
      for (const nn of noBranch) {
        if (prevNoBot !== null) arrowDown(RX, prevNoBot + 4, ny + 4, prevNoId, nn.id);
        const nd = DIM[nn.type] || DIM.process;
        const nnc = ny + nd.h / 2;
        elems.push({ ...nd, ...nn, cx: RX, cy: nnc, nodeType: nn.type });
        prevNoBot = ny + nd.h; prevNoId = nn.id;
        ny += nd.h + (GAP * 0.6);
      }
      noBot = ny;

      // Arrows from decision tips
      // YES arrow: left diamond tip → left → down to yes branch
      const firstYes = yesBranch[0];
      if (yesBranch.length > 0) {
        arrows.push({
          d:`M${CX - d.hw},${decMidY} L${LX},${decMidY} L${LX},${branchTopY}`,
          arrowEnd:true, label:'Ja', labelX:(CX-d.hw+LX)/2, labelY:decMidY-10, fromId:node.id, toId:firstYes?.id,
        });
      } else {
        arrows.push({
          d:`M${CX - d.hw},${decMidY} L${LX},${decMidY} L${LX},${branchTopY}`,
          arrowEnd:false, label:'Ja', labelX:(CX-d.hw+LX)/2, labelY:decMidY-10,
        });
      }

      // NO arrow: right diamond tip → right → down to no branch
      const firstNo = noBranch[0];
      if (noBranch.length > 0) {
        arrows.push({
          d:`M${CX + d.hw},${decMidY} L${RX},${decMidY} L${RX},${branchTopY}`,
          arrowEnd:true, label:'Nee', labelX:(CX+d.hw+RX)/2, labelY:decMidY-10, fromId:node.id, toId:firstNo?.id,
        });
      } else {
        // No branch is empty: draw loop-back arrow or just end
        arrows.push({
          d:`M${CX + d.hw},${decMidY} L${RX},${decMidY}`,
          arrowEnd:false, label:'Nee', labelX:(CX+d.hw+RX)/2, labelY:decMidY-10,
        });
      }

      // Merge paths back to center
      const mergeY = Math.max(yesBot, noBot) + (GAP * 0.6);
      if (yesBranch.length > 0) {
        arrows.push({ d:`M${LX},${yesBot} L${LX},${mergeY} L${CX},${mergeY}`, arrowEnd:false, merge:true });
      }
      if (noBranch.length > 0) {
        arrows.push({ d:`M${RX},${noBot} L${RX},${mergeY} L${CX},${mergeY}`, arrowEnd:false, merge:true });
      }

      // Next node will start from mergeY
      y = mergeY + GAP * 0.5;
      prevBot = mergeY; prevId = null;

    } else {
      if (prevBot !== null) arrowDown(CX, prevBot + 4, y + 4, prevId, node.id);
      const pos = addNode(node, CX);
      prevBot = pos.bot; prevId = node.id;
      y += GAP;
    }
  }

  const totalH = y + 20;
  const isActive = id => id && activeIds.includes(id);
  const isDone   = id => id && doneIds.includes(id);

  function getNodeColor(id) {
    if (isActive(id)) return color;
    if (isDone(id))   return color + '55';
    return '#1A2535';
  }
  function getStroke(id) {
    if (isActive(id)) return color;
    if (isDone(id))   return color + '88';
    return '#2E3F52';
  }
  function getTextCol(id) {
    if (isActive(id) || isDone(id)) return '#fff';
    return '#8BA0B8';
  }
  function getArrowColor(fromId, toId) {
    if ((isDone(fromId)||isActive(fromId)) && (isDone(toId)||isActive(toId)||!toId)) return color;
    return '#2E3F52';
  }

  const markerId = `ah-${color.replace(/[^a-z0-9]/gi,'')}`;

  return (
    <svg width={SVG_W} height={totalH} viewBox={`0 0 ${SVG_W} ${totalH}`} style={{display:'block',maxWidth:'100%',margin:'0 auto'}}>
      <defs>
        <marker id={markerId} markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
          <polygon points="0 0, 9 3.5, 0 7" fill={color} />
        </marker>
        <marker id="ah-gray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
          <polygon points="0 0, 9 3.5, 0 7" fill="#2E3F52" />
        </marker>
      </defs>

      {/* Arrows (below nodes) */}
      {arrows.map((a, i) => {
        const ac = a.merge ? '#2E3F52' : getArrowColor(a.fromId, a.toId);
        const isLit = ac === color;
        return (
          <g key={i}>
            <path d={a.d} fill="none" stroke={ac} strokeWidth={isLit?2:1.5}
              markerEnd={a.arrowEnd ? `url(#${isLit ? markerId : 'ah-gray'})` : undefined}
              strokeLinejoin="round" />
            {a.label && <text x={a.labelX} y={a.labelY} textAnchor="middle"
              fill={ac} fontSize="12" fontFamily="DM Sans, sans-serif" fontWeight="600">{a.label}</text>}
          </g>
        );
      })}

      {/* Nodes */}
      {elems.map((el) => {
        const fill = getNodeColor(el.id);
        const stroke = getStroke(el.id);
        const textC = getTextCol(el.id);
        const sw = isActive(el.id) ? 2.5 : 1.5;
        const { cx, cy, w, h, nodeType, id, label } = el;
        const hw = w/2, hh = h/2;
        const lines = wrapLabel(label);
        const lineH = 16;
        const startY = cy - ((lines.length-1)*lineH)/2;

        let shape;
        if (nodeType === 'terminal') {
          shape = <rect x={cx-hw} y={cy-hh} width={w} height={h} rx={hh} fill={fill} stroke={stroke} strokeWidth={sw}/>;
        } else if (nodeType === 'process') {
          shape = <rect x={cx-hw} y={cy-hh} width={w} height={h} rx={6} fill={fill} stroke={stroke} strokeWidth={sw}/>;
        } else if (nodeType === 'io') {
          const sk = 12;
          const pts = `${cx-hw+sk},${cy-hh} ${cx+hw},${cy-hh} ${cx+hw-sk},${cy+hh} ${cx-hw},${cy+hh}`;
          shape = <polygon points={pts} fill={fill} stroke={stroke} strokeWidth={sw}/>;
        } else if (nodeType === 'decision') {
          const pts = `${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`;
          shape = <polygon points={pts} fill={fill} stroke={stroke} strokeWidth={sw}/>;
        }

        return (
          <g key={id || label}>
            {shape}
            {isActive(id) && <rect x={cx-hw-4} y={cy-hh-4} width={w+8} height={h+8}
              rx={nodeType==='terminal'?hh+4:8} fill="none" stroke={color}
              strokeWidth={1.5} opacity={0.35} strokeDasharray="4,2"/>}
            {lines.map((ln, li) => (
              <text key={li} x={cx} y={startY + li*lineH} textAnchor="middle" dominantBaseline="middle"
                fill={textC} fontSize="12" fontFamily="Fira Code, monospace"
                fontWeight={isActive(id)?'700':'500'}>{ln}</text>
            ))}
          </g>
        );
      })}
    </svg>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  FLOWCHART BUILDER
// ══════════════════════════════════════════════════════════════════════════════
let _nextFCId = 100;
function newId() { return ++_nextFCId; }

function FlowchartBuilder({ problem, color }) {
  const [nodes, setNodes] = useState([
    { id: newId(), type:'terminal', label:'START' },
    { id: newId(), type:'terminal', label:'STOP'  },
  ]);
  const [showSolution, setShowSolution] = useState(false);
  const [dragIdx, setDragIdx]           = useState(null);
  const [dropIdx, setDropIdx]           = useState(null);
  const [showHelp, setShowHelp]         = useState(false);
  const [helpType, setHelpType]         = useState(null);
  // ── Uitvoer-state (trace op de door de student gebouwde flowchart) ──────────
  const [runInput, setRunInput]         = useState('');
  const [runStep, setRunStep]           = useState(-1);
  const [runPath, setRunPath]           = useState([]);
  const [runLog, setRunLog]             = useState([]);
  const [runTracing, setRunTracing]     = useState(false);
  const [runError, setRunError]         = useState('');

  const isProtected = (node) =>
    node.type === 'terminal' && (node.label === 'START' || node.label === 'STOP');

  const addNode = (type) => {
    const labels = {terminal:'Label', process:'Actie', io:'Invoer/Uitvoer', decision:'Conditie?'};
    const node = { id: newId(), type, label: labels[type] || 'Blok' };
    setNodes(ns => {
      const arr = [...ns];
      arr.splice(arr.length - 1, 0, node); // vóór STOP invoegen
      return arr;
    });
    setChecked(null);
  };

  const update   = (id, val) => setNodes(ns => ns.map(n => n.id===id ? {...n, label:val} : n));
  const del      = (id)      => { setNodes(ns => ns.filter(n => n.id !== id)); setChecked(null); };

  const addBranchNode    = (decId, branch, type='process') => {
    const defaultLabels = {process:'Actie', io:'Invoer/Uitvoer', decision:'Conditie?'};
    const bn = { id: newId(), type, label: defaultLabels[type] || 'Stap' };
    setNodes(ns => ns.map(n => n.id===decId ? {...n, [branch]:[...(n[branch]||[]), bn]} : n));
  };
  const removeBranchNode = (decId, branch, bnId) =>
    setNodes(ns => ns.map(n => n.id===decId
      ? {...n, [branch]:(n[branch]||[]).filter(b => b.id !== bnId)} : n));
  const updateBranchNode = (decId, branch, bnId, label) =>
    setNodes(ns => ns.map(n => n.id===decId
      ? {...n, [branch]:(n[branch]||[]).map(b => b.id===bnId ? {...b,label} : b)} : n));

  // ── Drag-and-drop handlers ──────────────────────────────────────────────────
  const onDragStart = (e, idx) => {
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragOver  = (e, idx) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    setDropIdx(idx);
  };
  const onDrop      = (e, targetIdx) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === targetIdx) { setDragIdx(null); setDropIdx(null); return; }
    setNodes(ns => {
      const arr = [...ns];
      const [moved] = arr.splice(dragIdx, 1);
      const insertAt = targetIdx > dragIdx ? targetIdx - 1 : targetIdx;
      arr.splice(insertAt, 0, moved);
      // START altijd eerst, STOP altijd als laatste
      const start  = arr.find(n => isProtected(n) && n.label==='START');
      const stop   = arr.find(n => isProtected(n) && n.label==='STOP');
      const middle = arr.filter(n => n !== start && n !== stop);
      return [start, ...middle, stop].filter(Boolean);
    });
    setDragIdx(null); setDropIdx(null); setChecked(null);
  };
  const onDragEnd   = () => { setDragIdx(null); setDropIdx(null); };

  const reset = () => {
    setNodes([
      { id: newId(), type:'terminal', label:'START' },
      { id: newId(), type:'terminal', label:'STOP'  },
    ]);
    setRunStep(-1); setRunTracing(false); setRunPath([]); setRunLog([]); setRunError('');
  };

  // ── Animatie-timer voor de uitvoer in de builder ────────────────────────────
  useEffect(() => {
    if (!runTracing || runStep < 0) return;
    if (runStep >= runPath.length - 1) { setRunTracing(false); return; }
    const t = setTimeout(() => setRunStep(s => s + 1), 700);
    return () => clearTimeout(t);
  }, [runTracing, runStep, runPath]);

  // ── Valideer en voer de door de student gemaakte flowchart uit ──────────────
  const validateAndRun = () => {
    const hasStart = nodes.some(n => n.label === 'START' && n.type === 'terminal');
    const hasStop  = nodes.some(n => n.label === 'STOP'  && n.type === 'terminal');
    if (!hasStart) {
      setRunError('❗ Je flowchart mist een START-blok. Voeg een blok van het type Start/Stop toe met label "START".');
      return;
    }
    if (!hasStop) {
      setRunError('❗ Je flowchart mist een STOP-blok. Voeg een blok van het type Start/Stop toe met label "STOP".');
      return;
    }
    if (nodes.length < 3) {
      setRunError('❗ Je flowchart is te leeg. Voeg minstens één stap toe tussen START en STOP.');
      return;
    }
    setRunError('');

    // Verzamel variabelen: lees de naam van Invoer-nodes en ken de invoerwaarde toe
    const vars = {};
    const inputNum = parseFloat(runInput);
    nodes.forEach(node => {
      if (node.type === 'io') {
        const lbl = (node.label || '').trim();
        if (/invoer/i.test(lbl)) {
          const varName = lbl.replace(/invoer:?\s*/i, '').trim();
          if (varName) vars[varName] = isNaN(inputNum) ? runInput : inputNum;
        }
      }
      // Voer process-nodes uit als JS om afgeleide variabelen te berekenen (bv. btw = netto * 0.21)
      if (node.type === 'process') {
        const expr = (node.label || '').replace(/\s*#.*$/, '').trim(); // strip comments
        if (/^\w+\s*=\s*/.test(expr)) {
          try {
            // Vervang variabelenamen door hun waarden en voer de toewijzing uit
            let jsExpr = expr;
            Object.entries(vars).forEach(([k, v]) => {
              jsExpr = jsExpr.replace(new RegExp(`\\b${k}\\b`, 'g'), String(v));
            });
            const varName = expr.split('=')[0].trim();
            // eslint-disable-next-line no-new-func
            vars[varName] = new Function(`return (${jsExpr.split('=').slice(1).join('=').trim()})`)();
          } catch (_) {}
        }
      }
    });

    // Evalueer de beslissingsconditie van de student echt, zodat de juiste tak gekozen wordt
    const evalCond = (label) => {
      let expr = (label || '').replace(/\s*\?+\s*$/, '').trim(); // verwijder trailing ?
      // Vervang variabelenamen door hun actuele waarden
      Object.entries(vars).forEach(([k, v]) => {
        expr = expr.replace(new RegExp(`\\b${k}\\b`, 'g'), String(v));
      });
      try {
        // eslint-disable-next-line no-new-func
        return Boolean(new Function(`return (${expr})`)());
      } catch (_) {
        return true; // bij fout: neem Ja-tak als fallback
      }
    };

    // Bouw het pad door de nodes van de student op basis van echte conditie-evaluatie
    const userPath = [];
    nodes.forEach(node => {
      userPath.push(node.id);
      if (node.type === 'decision') {
        const condTrue = evalCond(node.label);
        const branch = condTrue ? 'yesBranch' : 'noBranch';
        (node[branch] || []).forEach(bn => userPath.push(bn.id));
      }
    });

    setRunPath(userPath);
    setRunLog(buildTraceLog(userPath, nodes, runInput));
    setRunStep(0);
    setRunTracing(true);
  };

  const runDone = runStep >= runPath.length - 1 && !runTracing && runStep >= 0;
  const runActiveIds = runStep >= 0 ? [runPath[runStep]] : [];
  const runDoneIds   = runStep > 0  ? runPath.slice(0, runStep) : [];

  return (
    <div style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start'}}>
      {/* ── Left: Editor ── */}
      <div style={{flex:'1 1 260px',minWidth:240}}>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,color:'var(--text2)',marginBottom:10}}>
          📐 Bouw je flowchart
        </div>

        {/* Palette – 2×2 raster */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
          {NODE_TYPE_DEFS.map(def => (
            <div key={def.type} style={{display:'flex',gap:2}}>
              <button onClick={() => addNode(def.type)}
                title={`Voeg ${def.label} toe`}
                style={{flex:1,padding:'8px 10px',borderRadius:'8px 0 0 8px',border:`1.5px solid ${def.color}55`,
                  borderRight:'none',background:`${def.color}12`,color:def.color,fontSize:12,
                  fontFamily:'Fira Code,monospace',cursor:'pointer',textAlign:'left',
                  display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:16}}>{def.symbol}</span>
                <span>{def.label}</span>
              </button>
              <button onClick={() => { setHelpType(def.type); setShowHelp(true); }}
                title={`Uitleg ${def.label}`}
                style={{padding:'0 7px',borderRadius:'0 8px 8px 0',border:`1.5px solid ${def.color}55`,
                  background:`${def.color}18`,color:def.color,fontSize:13,cursor:'pointer',
                  fontFamily:'sans-serif',lineHeight:1}}>?</button>
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:'var(--text3)',fontFamily:'Sora,sans-serif',marginBottom:12}}>
          Klik <strong style={{color:'var(--text2)'}}>?</strong> naast een bloktype voor uitleg en voorbeelden
        </div>

        {/* Help-modal */}
        {showHelp && helpType && (() => {
          const h = NODE_HELP[helpType];
          const def = NODE_TYPE_DEFS.find(d => d.type===helpType);
          return (
            <div className="fade-in" style={{marginBottom:14,background:'var(--bg)',borderRadius:10,
              border:`1.5px solid ${def.color}66`,padding:'12px 14px',position:'relative'}}>
              <button onClick={() => setShowHelp(false)}
                style={{position:'absolute',top:6,right:8,background:'none',border:'none',
                  color:'var(--text3)',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>
              <div style={{color:def.color,fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,marginBottom:6}}>
                {def.symbol} {h.title}
              </div>
              <div style={{color:'var(--text2)',fontSize:12,fontFamily:'DM Sans,sans-serif',lineHeight:1.5,marginBottom:8}}>
                {h.tip}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',fontFamily:'Sora,sans-serif',marginBottom:4,fontWeight:600}}>Voorbeeldlabels:</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {h.examples.map((ex,i) => (
                  <span key={i} style={{background:`${def.color}18`,color:def.color,borderRadius:5,
                    padding:'3px 8px',fontSize:11,fontFamily:'Fira Code,monospace',cursor:'pointer'}}
                    title="Klik om te kopiëren"
                    onClick={() => navigator.clipboard?.writeText(ex)}>
                    {ex}
                  </span>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Node list met drag-and-drop */}
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          {nodes.map((node, i) => {
            const def        = NODE_TYPE_DEFS.find(d => d.type===node.type) || NODE_TYPE_DEFS[1];
            const prot       = isProtected(node);
            const isDragging = dragIdx === i;
            const isTarget   = dropIdx === i && dragIdx !== null && dragIdx !== i;
            return (
              <div key={node.id}>
                {/* Drop-indicator */}
                {isTarget && (
                  <div style={{height:3,borderRadius:2,background:color,margin:'2px 0',
                    boxShadow:`0 0 8px ${color}88`}}/>
                )}

                <div
                  draggable={!prot}
                  onDragStart={e => !prot && onDragStart(e, i)}
                  onDragOver={e  => onDragOver(e, i)}
                  onDrop={e      => onDrop(e, i)}
                  onDragEnd={onDragEnd}
                  style={{
                    background: isDragging ? `${def.color}20` : 'var(--bg3)',
                    border: `1.5px solid ${isTarget ? color : def.color+'33'}`,
                    borderRadius:8, padding:'8px 10px',
                    display:'flex', alignItems:'center', gap:8,
                    opacity: isDragging ? 0.45 : 1,
                    cursor: prot ? 'default' : 'grab',
                    transition:'opacity .15s,border-color .15s',
                    userSelect:'none',
                  }}>
                  {/* Sleepgreep */}
                  <span style={{color:'var(--text3)',fontSize:15,lineHeight:1,
                    visibility: prot ? 'hidden' : 'visible', cursor:'grab', flexShrink:0}}>⠿</span>
                  <span style={{color:def.color,fontSize:14,minWidth:18,flexShrink:0}}>{def.symbol}</span>
                  <input
                    value={node.label}
                    onChange={e => update(node.id, e.target.value)}
                    disabled={prot}
                    style={{flex:1,background:'transparent',border:'none',
                      color: prot ? 'var(--text3)' : 'var(--text)',
                      fontFamily:'Fira Code,monospace',fontSize:13,outline:'none',
                      cursor: prot ? 'default' : 'text'}}/>
                  {!prot && (
                    <button onClick={() => del(node.id)}
                      style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',
                        fontSize:16,lineHeight:1,padding:'0 2px',opacity:.7,flexShrink:0}}>×</button>
                  )}
                </div>

                {/* Beslissing-branches */}
                {node.type === 'decision' && (
                  <div style={{marginLeft:16,marginTop:4,marginBottom:2,display:'flex',gap:8}}>
                    {[['yesBranch','✓ Ja-tak','#34D399'],['noBranch','✗ Nee-tak','#F87171']].map(([branch, bLabel, bc]) => (
                      <div key={branch} style={{flex:1,background:`${bc}08`,borderRadius:6,
                        padding:'6px 8px',border:`1px dashed ${bc}33`}}>
                        <div style={{color:bc,fontSize:11,fontWeight:700,marginBottom:4}}>{bLabel}</div>

                        {/* Branch nodes met type-symbool */}
                        {(node[branch]||[]).map(bn => {
                          const bnDef = NODE_TYPE_DEFS.find(d => d.type===bn.type) || NODE_TYPE_DEFS[1];
                          return (
                            <div key={bn.id} style={{display:'flex',gap:4,marginBottom:4,alignItems:'center'}}>
                              <span title={bnDef.label} style={{color:bnDef.color,fontSize:13,minWidth:14,textAlign:'center',cursor:'default'}}>{bnDef.symbol}</span>
                              <input value={bn.label}
                                onChange={e => updateBranchNode(node.id, branch, bn.id, e.target.value)}
                                style={{flex:1,background:'var(--bg)',border:`1px solid ${bc}33`,borderRadius:4,
                                  padding:'3px 8px',color:'var(--text)',fontFamily:'Fira Code,monospace',
                                  fontSize:12,outline:'none'}}/>
                              <button onClick={() => removeBranchNode(node.id, branch, bn.id)}
                                style={{background:'none',border:'none',color:'var(--red)',
                                  cursor:'pointer',fontSize:14,padding:0}}>×</button>
                            </div>
                          );
                        })}

                        {/* Type-picker: 3 mini-knoppen (geen terminal in branch) */}
                        <div style={{display:'flex',gap:3,marginTop:4}}>
                          {NODE_TYPE_DEFS.filter(d => d.type !== 'terminal').map(td => (
                            <button key={td.type}
                              onClick={() => addBranchNode(node.id, branch, td.type)}
                              title={`Voeg ${td.label} toe`}
                              style={{flex:1,padding:'3px 4px',borderRadius:5,
                                border:`1px dashed ${bc}55`,background:`${td.color}10`,
                                color:td.color,fontSize:12,cursor:'pointer',lineHeight:1,
                                fontFamily:'Fira Code,monospace', display:'flex',
                                alignItems:'center',justifyContent:'center',gap:3}}>
                              {td.symbol}
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* ── Uitvoeren + hulpknoppen ── */}
        <div style={{marginTop:14}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:6}}>
            <input
              type="number"
              placeholder="Testwaarde (getal)..."
              value={runInput}
              onChange={e => { setRunInput(e.target.value); setRunStep(-1); setRunTracing(false); setRunError(''); }}
              style={{flex:1,minWidth:130,background:'var(--card)',border:'1px solid var(--border)',
                borderRadius:8,padding:'8px 12px',color:'var(--text)',
                fontFamily:'Fira Code,monospace',fontSize:13,outline:'none'}}/>
            <button onClick={validateAndRun} disabled={runTracing}
              style={{padding:'8px 16px',borderRadius:8,border:'none',
                cursor:runTracing?'default':'pointer',
                background:runTracing?'var(--bg3)':color,
                color:runTracing?'var(--text3)':'#fff',
                fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,transition:'all .2s',
                whiteSpace:'nowrap'}}>
              {runTracing ? '⟳ Bezig...' : '▶ Uitvoeren'}
            </button>
            <button onClick={() => setShowSolution(s => !s)}
              style={{padding:'8px 12px',borderRadius:8,border:`1px solid var(--border)`,cursor:'pointer',
                background:'var(--bg3)',color:'var(--text2)',fontFamily:'Sora,sans-serif',fontSize:13}}>
              {showSolution ? '🙈 Verberg' : '💡 Oplossing'}
            </button>
            <button onClick={reset}
              style={{padding:'8px 10px',borderRadius:8,border:`1px solid var(--border)`,cursor:'pointer',
                background:'var(--bg3)',color:'var(--text3)',fontFamily:'Sora,sans-serif',fontSize:13}}>
              🗑️
            </button>
          </div>

          {/* Validatiefout met gerichte tip */}
          {runError && (
            <div className="fade-in" style={{padding:'10px 14px',borderRadius:8,marginTop:6,
              background:'#e73f1610',border:'1px solid #e73f1640',
              color:'#c0320f',fontFamily:'Sora,sans-serif',fontSize:13,lineHeight:1.5}}>
              {runError}
            </div>
          )}

          {/* Uitvoerlog — progressief zichtbaar tijdens animatie */}
          {runStep >= 0 && (
            <div className="fade-in" style={{marginTop:8,padding:'12px 14px',borderRadius:8,
              background:'var(--code-bg2)',border:'1px solid var(--border)'}}>
              <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:11,
                color:'var(--text3)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8}}>
                🖥️ Uitvoer
              </div>
              {runLog.map((entry, i) => (
                <div key={i} style={{
                  fontFamily:'Fira Code,monospace',fontSize:12,lineHeight:1.8,
                  color: i <= runStep ? (LOG_COLORS[entry.kind] || '#aab') : '#555',
                  opacity: i <= runStep ? 1 : 0.2,
                  transition:'opacity .3s,color .3s',
                  fontWeight: entry.kind === 'output' ? 700 : 400,
                }}>{entry.text}</div>
              ))}
              {runDone && (
                <div style={{marginTop:8,color:'var(--mint)',fontFamily:'Sora,sans-serif',
                  fontWeight:700,fontSize:12}}>✓ Klaar!</div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── Right: Preview ── */}
      <div style={{flex:'1 1 300px',minWidth:300}}>
        <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,color:'var(--text2)',marginBottom:10}}>
          👁️ {showSolution ? 'Oplossing' : 'Jouw flowchart'}
        </div>
        <div style={{background:'#080C14',borderRadius:12,padding:16,overflowX:'auto'}}>
          <FlowchartSVG
            flowNodes={showSolution ? problem.nodes : nodes}
            activeIds={!showSolution && runStep >= 0 ? runActiveIds : []}
            doneIds={!showSolution && runStep > 0 ? runDoneIds : []}
            color={color} width={580}/>
        </div>
        <div style={{marginTop:8,fontSize:11,color:'var(--text3)',fontFamily:'Sora,sans-serif',textAlign:'center'}}>
          Sleep blokken in de lijst om ze te herordenen · Voer in om te testen
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  FLOWCHART TRACE SECTION
// ══════════════════════════════════════════════════════════════════════════════
// ── Zoek een node op basis van id, ook diep in branches ──────────────────────
function findNodeById(nodes, id) {
  for (const n of (nodes || [])) {
    if (n.id === id) return n;
    const inYes = findNodeById(n.yesBranch, id);
    if (inYes) return inYes;
    const inNo  = findNodeById(n.noBranch, id);
    if (inNo)  return inNo;
  }
  return null;
}

// ── Bouw een uitvoerlog op basis van het trace-pad ────────────────────────────
function buildTraceLog(path, allNodes, inputVal, computedOutputs = []) {
  const log = [];
  let outIdx = 0;
  path.forEach((id, idx) => {
    const node = findNodeById(allNodes, id);
    if (!node) return;
    switch (node.type) {
      case 'terminal':
        log.push({ kind:'terminal', text: node.label === 'START' ? '▶ Programma start' : '■ Programma klaar' });
        break;
      case 'io': {
        const lbl = (node.label || '').trim();
        if (/invoer/i.test(lbl)) {
          // Invoer-node: toon de ingetypte waarde
          const varName = lbl.replace(/invoer:?\s*/i,'').trim() || 'waarde';
          log.push({ kind:'input', text:`📥 Invoer:  ${varName} = ${inputVal}` });
        } else {
          // Uitvoer-node: toon werkelijk berekende waarde indien beschikbaar
          const computed = computedOutputs[outIdx++];
          const fallback = lbl.replace(/uitvoer:?\s*/i,'').replace(/^["']|["']$/g,'').trim();
          const display  = computed !== undefined ? computed : fallback;
          log.push({ kind:'output', text:`📤 Uitvoer: ${display}` });
        }
        break;
      }
      case 'process':
        log.push({ kind:'process', text:`⚙  Actie:   ${node.label}` });
        break;
      case 'decision': {
        // Bepaal of de volgende stap in de Ja- of Nee-tak zit
        const nextId = path[idx + 1];
        const yesIds = (node.yesBranch || []).flatMap(b => [b.id, ...(b.yesBranch||[]).map(x=>x.id)]);
        const noIds  = (node.noBranch  || []).flatMap(b => [b.id, ...(b.noBranch ||[]).map(x=>x.id)]);
        // Bij while-lus is noBranch leeg; als nextId niet in yesBranch zit, is het de Nee-tak
        const branch = yesIds.includes(nextId) ? '→ Ja'
                     : noIds.includes(nextId)  ? '→ Nee'
                     : nextId                  ? '→ Nee'   // lus-exit of impliciete nee-tak
                     : '';
        log.push({ kind:'decision', text:`◇  Vraag:   ${node.label}  ${branch}` });
        break;
      }
    }
  });
  return log;
}

const LOG_COLORS = {
  terminal: '#A78BFA',
  input:    '#38BDF8',
  output:   '#34D399',
  process:  '#9B5CF6',
  decision: '#FCD34D',
};

function FlowchartSection({ module }) {
  const [inputVal, setInputVal] = useState('');
  const [tracing, setTracing]   = useState(false);
  const [step, setStep]         = useState(-1);
  const [tracePath, setTracePath] = useState([]);
  const [traceLog, setTraceLog]   = useState([]);
  const [tab, setTab]           = useState('trace'); // 'trace' | 'build'
  const problem = module.flowchartProblem;

  const startTrace = async () => {
    const n    = parseFloat(inputVal) || 0;
    const path = problem.traceActive
      ? problem.traceActive(n)
      : problem.nodes.map(nd => nd.id).filter(Boolean);
    setTracePath(path);

    // Synthetiseer Python-code uit de flowchart-nodes zodat we echte waarden kunnen berekenen
    const flowLines = [];
    path.forEach(id => {
      const node = findNodeById(problem.nodes, id);
      if (!node) return;
      if (node.type === 'io') {
        const lbl = (node.label || '').trim();
        if (/invoer/i.test(lbl)) {
          const varName = lbl.replace(/invoer:?\s*/i, '').trim() || 'waarde';
          // Probeer float; val terug op string als het niet werkt
          flowLines.push(`try:\n  ${varName} = float(input())\nexcept:\n  ${varName} = input()`);
        } else {
          const varName = lbl.replace(/uitvoer:?\s*/i, '').replace(/^["']|["']$/g,'').trim();
          flowLines.push(`print(${varName})`);
        }
      } else if (node.type === 'process') {
        flowLines.push((node.label || '').trim());
      } else if (node.type === 'decision') {
        // Beslissings-conditie hoeft niet opnieuw geëvalueerd: pad is al bepaald via traceActive
      }
    });

    // Voer de gesynthetiseerde code uit via Skulpt om echte uitvoerwaarden te krijgen
    const computedOutputs = [];
    try {
      const flowCode = flowLines.join('\n');
      const skOut = [];
      Sk.configure({
        output: txt => { skOut.push(txt); },
        read: x => {
          if (Sk.builtinFiles?.files?.[x]) return Sk.builtinFiles.files[x];
          throw new Error(x + ': not found');
        },
        inputfun: () => Promise.resolve(String(inputVal)),
        inputfunTakesPrompt: true,
        __future__: Sk.python3,
      });
      await Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, flowCode, true));
      // Splits gecombineerde output op newlines, verwijder lege regels
      skOut.join('').split('\n').forEach(l => { if (l !== '') computedOutputs.push(l); });
    } catch (_) { /* bij fout: toon fallback-labels */ }

    setTraceLog(buildTraceLog(path, problem.nodes, inputVal, computedOutputs));
    setStep(0);
    setTracing(true);
  };

  const reset = () => { setStep(-1); setTracing(false); setTracePath([]); setTraceLog([]); };

  useEffect(() => {
    if (!tracing || step < 0) return;
    if (step >= tracePath.length - 1) { setTracing(false); return; }
    const t = setTimeout(() => setStep(s => s+1), 700);
    return () => clearTimeout(t);
  }, [tracing, step, tracePath]);

  const activeIds = tracing || step >= 0 ? [tracePath[step]] : [];
  const doneIds   = step > 0 ? tracePath.slice(0, step) : [];
  const isDone    = step >= tracePath.length - 1 && !tracing && step >= 0;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:20}}>
        <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,marginBottom:6,color:module.color}}>{problem.title}</h3>
        <p style={{color:'var(--text2)',lineHeight:1.7,marginBottom:16,fontSize:14}}>{problem.description}</p>

        {/* Tab switch */}
        <div style={{display:'flex',gap:4,background:'var(--bg2)',borderRadius:8,padding:3,
          border:'1px solid var(--border)',marginBottom:16,width:'fit-content'}}>
          {[['trace','▶ Uitvoeren'],['build','🔨 Zelf bouwen']].map(([t,l]) => (
            <button key={t} onClick={()=>setTab(t)}
              style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',
                background:tab===t?'var(--card)':'transparent',
                color:tab===t?module.color:'var(--text3)',
                fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:13,transition:'all .2s'}}>
              {l}
            </button>
          ))}
        </div>

        {tab === 'trace' && (
          <div>
            {/* Invoer + knoppen */}
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              <input type="number" placeholder="Geef een getal in..." value={inputVal}
                onChange={e=>{ setInputVal(e.target.value); reset(); }}
                style={{flex:1,minWidth:180,background:'var(--card)',border:'1px solid var(--border)',
                  borderRadius:8,padding:'10px 14px',color:'var(--text)',
                  fontFamily:'Fira Code,monospace',fontSize:14,outline:'none'}}/>
              <button onClick={startTrace} disabled={tracing||!inputVal}
                style={{padding:'10px 24px',borderRadius:8,border:'none',
                  cursor:!inputVal||tracing?'default':'pointer',
                  background:!inputVal||tracing?'var(--bg3)':module.color,
                  color:!inputVal||tracing?'var(--text3)':'#000',
                  fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14,transition:'all .2s'}}>
                {tracing?'⟳ Bezig...':'▶ Uitvoeren'}
              </button>
              {step >= 0 && (
                <button onClick={reset}
                  style={{padding:'10px 16px',borderRadius:8,border:'1px solid var(--border)',
                    background:'transparent',color:'var(--text3)',cursor:'pointer',fontSize:13}}>
                  ↺ Reset
                </button>
              )}
            </div>

            {/* Flowchart SVG + uitvoerlog naast elkaar */}
            <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
              {/* SVG */}
              <div style={{flex:'1 1 300px',background:'#080C14',borderRadius:12,padding:12,overflowX:'auto'}}>
                <FlowchartSVG flowNodes={problem.nodes} activeIds={activeIds} doneIds={doneIds}
                  color={module.color} width={480}/>
              </div>

              {/* Uitvoer-console */}
              {step >= 0 && (
                <div className="fade-in" style={{flex:'0 0 220px',minWidth:200}}>
                  <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
                    color:'var(--text3)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8}}>
                    🖥️ Uitvoer
                  </div>
                  <div style={{background:'#080C14',borderRadius:10,padding:'12px 14px',
                    border:'1px solid var(--border)',minHeight:120}}>
                    {traceLog.map((entry, i) => (
                      <div key={i} style={{
                        fontFamily:'Fira Code,monospace',fontSize:12,lineHeight:1.8,
                        color: i <= step ? (LOG_COLORS[entry.kind] || 'var(--text)') : 'var(--text3)',
                        opacity: i <= step ? 1 : 0.2,
                        transition:'opacity .3s, color .3s',
                        fontWeight: entry.kind==='output' ? 700 : 400,
                      }}>
                        {entry.text}
                      </div>
                    ))}
                  </div>
                  {isDone && (
                    <div className="fade-in" style={{marginTop:8,padding:'7px 12px',borderRadius:8,
                      background:`${module.color}18`,border:`1px solid ${module.color}44`,
                      color:module.color,fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
                      textAlign:'center'}}>
                      ✓ Klaar!
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        {tab === 'build' && (
          <FlowchartBuilder problem={problem} color={module.color}/>
        )}
      </div>

      {/* Symbolen */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:20}}>
        <h4 style={{fontFamily:'Sora,sans-serif',fontWeight:700,marginBottom:12,fontSize:14}}>💡 Flowchart-symbolen</h4>
        {[['⬭','Ovaal','Start / Stop','#00E5C3'],['□','Rechthoek','Actie of berekening','#9B5CF6'],
          ['◇','Ruit','Beslissing (Ja/Nee)','#FF6D35'],['▱','Parallellogram','Invoer of Uitvoer','#FCD34D']].map(([s,n,d,c])=>(
          <div key={s} style={{display:'flex',gap:12,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'Fira Code,monospace',fontSize:18,color:c,minWidth:28}}>{s}</span>
            <span style={{fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:13,color:c,minWidth:100}}>{n}</span>
            <span style={{color:'var(--text2)',fontSize:13}}>{d}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

//  CODE SECTION — Skulpt (echte Python)
// ══════════════════════════════════════════════════════════════════════════════
function CodeSection({ module, onRun }) {
  const [code, setCode] = useState(module.codeTemplate);
  const [output, setOutput] = useState('');
  const [running, setRunning] = useState(false);
  const [inputPrompts, setInputPrompts] = useState([]);
  const [inputVals, setInputVals] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const inputQueueRef = useRef([]);
  const canvasRef = useRef(null);

  const hasTurtle = code.includes('import turtle') || code.includes('from turtle');

  const handleRun = () => {
    const prompts = extractInputCalls(code);
    if (prompts.length > 0) {
      setInputPrompts(prompts);
      setInputVals(new Array(prompts.length).fill(''));
      setShowModal(true);
    } else {
      executeCode([]);
    }
  };

  const executeCode = (vals) => {
    setShowModal(false);
    setRunning(true);
    setOutput('');
    inputQueueRef.current = [...vals];
    let outputText = '';

    if (hasTurtle && canvasRef.current) {
      // Skulpt maakt zelf een <canvas> aan BINNEN het target-element.
      // Verwijder vorige tekening voor een nieuwe run.
      canvasRef.current.innerHTML = '';
      const cw = canvasRef.current.offsetWidth || 640;
      const ch = Math.max(cw, 480);   // minimaal 480px hoog, groeit mee met breedte
      Sk.TurtleGraphics = { target: canvasRef.current, width: cw, height: ch };
    }

    Sk.configure({
      output: (text) => { outputText += text; setOutput(outputText); },
      read: (x) => {
        if (!Sk.builtinFiles || !Sk.builtinFiles['files'][x])
          throw 'File not found: "' + x + '"';
        return Sk.builtinFiles['files'][x];
      },
      inputfun: (_prompt) => new Promise(resolve => {
        resolve(String(inputQueueRef.current.shift() ?? ''));
      }),
      inputfunTakesPrompt: true,
      __future__: Sk.python3,
    });

    Sk.misceval.asyncToPromise(
      () => Sk.importMainWithBody('<stdin>', false, code, true)
    ).then(() => {
      if (!outputText.trim() && !hasTurtle) setOutput('(geen uitvoer)');
      setRunning(false);
      onRun();
    }).catch(e => {
      const msg = e.tp$str ? e.tp$str().v : (e.toString ? e.toString() : 'Onbekende fout');
      setOutput((outputText || '') + '\n\n⚠️ Python-fout:\n' + msg);
      setRunning(false);
    });
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* Input modal */}
      {showModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:1000,
          display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="fade-in" style={{background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:16,padding:32,width:420,maxWidth:'90vw'}}>
            <h3 style={{fontFamily:'Sora,sans-serif',fontWeight:700,marginBottom:6}}>⌨️ Programma-invoer</h3>
            <p style={{color:'var(--text2)',fontSize:14,marginBottom:20,lineHeight:1.6}}>
              Dit programma vraagt invoer. Geef de waarden in die de gebruiker zou typen:
            </p>
            {inputPrompts.map((prompt, i) => (
              <div key={i} style={{marginBottom:14}}>
                <label style={{display:'block',color:module.color,fontSize:13,fontFamily:'Fira Code,monospace',marginBottom:6}}>
                  {prompt}
                </label>
                <input value={inputVals[i]} onChange={e=>{ const nv=[...inputVals]; nv[i]=e.target.value; setInputVals(nv); }}
                  onKeyDown={e=>e.key==='Enter' && i===inputPrompts.length-1 && executeCode(inputVals)}
                  placeholder={`Invoer voor: ${prompt}`} autoFocus={i===0}
                  style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,
                    padding:'10px 14px',color:'var(--text)',fontFamily:'Fira Code,monospace',
                    fontSize:14,outline:'none',transition:'border .2s'}}/>
              </div>
            ))}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
              <button onClick={()=>setShowModal(false)} style={{padding:'9px 18px',borderRadius:8,
                border:'1px solid var(--border)',background:'transparent',color:'var(--text2)',cursor:'pointer'}}>
                Annuleer
              </button>
              <button onClick={()=>executeCode(inputVals)}
                style={{padding:'9px 20px',borderRadius:8,border:'none',cursor:'pointer',
                  background:module.color,color:'#000',fontFamily:'Sora,sans-serif',fontWeight:700}}>
                ▶ Uitvoeren
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Editor */}
      <div style={{background:'#080C14',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'#0D1117'}}>
          <div style={{display:'flex',gap:6}}>
            <div style={{width:12,height:12,borderRadius:999,background:'#F87171'}}/>
            <div style={{width:12,height:12,borderRadius:999,background:'#FCD34D'}}/>
            <div style={{width:12,height:12,borderRadius:999,background:'#34D399'}}/>
          </div>
          <span style={{fontFamily:'Fira Code,monospace',fontSize:12,color:'var(--text3)'}}>module{module.id}.py</span>
          <button onClick={handleRun} disabled={running}
            style={{padding:'6px 16px',borderRadius:6,border:'none',
              cursor:running?'default':'pointer',
              background:running?'var(--bg3)':'var(--mint)',
              color:running?'var(--text3)':'#fff',
              fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:12,
              display:'flex',alignItems:'center',gap:6}}>
            {running
              ? <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span>
              : '▶'}
            {running ? 'Uitvoeren...' : 'Uitvoeren'}
          </button>
        </div>
        <textarea value={code} onChange={e=>setCode(e.target.value)} spellCheck={false}
          style={{width:'100%',minHeight:280,background:'transparent',border:'none',outline:'none',
            padding:'18px 20px',fontFamily:'Fira Code,monospace',fontSize:13.5,
            color:'#A8D8A8',lineHeight:1.7,resize:'vertical',tabSize:4}}/>
      </div>

      {output && (
        <div className="fade-in" style={{background:'#080C14',border:`1px solid ${output.includes('⚠️')?'#3A1E1E':'#1E3A2A'}`,borderRadius:12,overflow:'hidden'}}>
          <div style={{padding:'9px 16px',background:'#0D1117',borderBottom:`1px solid ${output.includes('⚠️')?'#3A1E1E':'#1E3A2A'}`,
            fontFamily:'Sora,sans-serif',fontSize:12,color:output.includes('⚠️')?'#F87171':'#34D399',fontWeight:700}}>
            {output.includes('⚠️') ? '⚠️ Python-fout' : '● Output'}
          </div>
          <pre style={{padding:'16px 20px',fontFamily:'Fira Code,monospace',fontSize:13.5,
            color:output.includes('⚠️')?'#F87171':'#E2EBF5',lineHeight:1.7,overflow:'auto',whiteSpace:'pre-wrap'}}>{output}</pre>
        </div>
      )}

      {hasTurtle && (
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
          <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:13,color:'#34D399',marginBottom:10}}>🐢 Turtle-canvas</div>
          <div ref={canvasRef}
            style={{background:'#fff',borderRadius:8,width:'100%',minHeight:200,
              overflow:'auto'}}/>
        </div>
      )}

      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:14}}>
        <p style={{color:'var(--text2)',fontSize:13,lineHeight:1.7}}>
          💡 <strong style={{color:'var(--text)'}}>Tip:</strong> Pas de code aan en klik op <span style={{color:'#34D399',fontFamily:'Fira Code,monospace'}}>▶ Uitvoeren</span>.
          De code draait als <strong style={{color:'var(--text)'}}>echte Python</strong> via Skulpt.
          {hasTurtle && <span style={{color:'#FCD34D'}}> De turtle tekening verschijnt in de canvas hieronder. Gebruik <code>t.speed(10)</code> voor snelle animatie.</span>}
        </p>
      </div>
    </div>
  );
}
