<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DevFlow Academy — Softwareontwikkelflow | Odisee</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:   #1f416b;
    --navy2:  #163256;
    --mint:   #3cb497;
    --mint2:  #2a9078;
    --storm:  #00639c;
    --red-od: #e73f16;
    --purple: #9B5CF6;
    --amber:  #d97706;
    --bg:     #f0f3f8;
    --bg2:    #e6ebf2;
    --bg3:    #d8dfea;
    --card:   #ffffff;
    --border: #c2ccd8;
    --text:   #181716;
    --text2:  #3a4d62;
    --text3:  #7a8fa0;
    --code-bg:#0d1117;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  h1,h2,h3,h4,h5 { font-family:'Sora',sans-serif; }
  code,.mono { font-family:'Fira Code',monospace; font-size:.85em; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--mint); }
  @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  @keyframes xpPop   { 0%{opacity:0;transform:scale(.4) translateY(0)} 60%{opacity:1;transform:scale(1.3) translateY(-24px)} 100%{opacity:0;transform:scale(1) translateY(-48px)} }
  @keyframes badgePop{ 0%{opacity:0;transform:scale(.3) rotate(-15deg)} 60%{transform:scale(1.15) rotate(5deg)} 100%{opacity:1;transform:scale(1)} }
  @keyframes pulse   { 0%,100%{box-shadow:0 0 0 0 rgba(60,180,151,.4)} 50%{box-shadow:0 0 0 8px rgba(60,180,151,0)} }
  @keyframes shine   { 0%{left:-100%} 100%{left:200%} }
  .fade-in { animation:fadeIn .3s ease both; }
  /* Layout */
  .app-shell { display:grid; grid-template-columns:280px 1fr; grid-template-rows:auto auto 1fr; min-height:100vh; }
  .topbar { grid-column:1/-1; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:64px; position:sticky; top:0; z-index:100; box-shadow:0 2px 16px rgba(0,0,0,.18); }
  .topbar-brand { display:flex; align-items:center; gap:12px; }
  .topbar-brand-icon { width:36px; height:36px; background:var(--mint); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .topbar-brand h1 { font-size:1.1rem; font-weight:800; letter-spacing:-.02em; }
  .topbar-brand p { font-size:.7rem; color:rgba(255,255,255,.6); font-family:'DM Sans',sans-serif; }
  .topbar-xp { display:flex; align-items:center; gap:10px; }
  .xp-badge { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:6px 16px; font-family:'Sora',sans-serif; font-weight:700; font-size:.95rem; display:flex; align-items:center; gap:6px; }
  .xp-badge span { color:var(--mint); }
  /* Timeline */
  .timeline-bar { grid-column:1/-1; background:var(--navy2); padding:16px 28px; overflow-x:auto; }
  .timeline { display:flex; align-items:center; gap:0; min-width:600px; }
  .tl-step { flex:1; display:flex; flex-direction:column; align-items:center; position:relative; cursor:pointer; }
  .tl-step:not(:last-child)::after { content:''; position:absolute; top:18px; left:50%; width:100%; height:3px; background:rgba(255,255,255,.15); z-index:0; }
  .tl-step.done:not(:last-child)::after { background:var(--mint); }
  .tl-dot { width:36px; height:36px; border-radius:50%; border:3px solid rgba(255,255,255,.2); background:var(--navy); display:flex; align-items:center; justify-content:center; font-size:15px; position:relative; z-index:1; transition:.2s; }
  .tl-step.done .tl-dot { background:var(--mint); border-color:var(--mint); }
  .tl-step.active .tl-dot { background:var(--navy); border-color:var(--mint); box-shadow:0 0 0 4px rgba(60,180,151,.25); animation:pulse 2s infinite; }
  .tl-label { font-size:.62rem; color:rgba(255,255,255,.55); margin-top:6px; text-align:center; font-family:'DM Sans',sans-serif; font-weight:600; max-width:70px; line-height:1.2; }
  .tl-step.active .tl-label { color:var(--mint); }
  .tl-step.done .tl-label { color:rgba(255,255,255,.8); }
  /* Sidebar */
  .sidebar { background:var(--card); border-right:1px solid var(--border); padding:24px 16px; position:sticky; top:112px; height:calc(100vh - 112px); overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .sidebar-section-title { font-size:.65rem; font-weight:700; letter-spacing:.1em; color:var(--text3); text-transform:uppercase; padding:0 8px 6px; }
  .sprint-nav-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:none; background:transparent; cursor:pointer; width:100%; text-align:left; transition:.15s; position:relative; }
  .sprint-nav-btn:hover { background:var(--bg); }
  .sprint-nav-btn.active { background:var(--bg2); }
  .sprint-nav-btn .snb-emoji { font-size:18px; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sprint-nav-btn .snb-info { flex:1; min-width:0; }
  .sprint-nav-btn .snb-title { font-family:'Sora',sans-serif; font-size:.78rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sprint-nav-btn .snb-week { font-size:.65rem; color:var(--text3); }
  .sprint-nav-btn .snb-status { font-size:.6rem; font-weight:700; padding:2px 7px; border-radius:10px; flex-shrink:0; }
  .status-active { background:rgba(60,180,151,.15); color:var(--mint2); }
  .status-done   { background:rgba(60,180,151,.15); color:var(--mint2); }
  .status-locked { background:var(--bg2); color:var(--text3); }
  .sidebar-progress { margin-top:auto; padding-top:16px; border-top:1px solid var(--border); }
  .prog-label { font-size:.7rem; color:var(--text3); margin-bottom:6px; display:flex; justify-content:space-between; }
  .prog-bar-outer { height:8px; background:var(--bg2); border-radius:4px; overflow:hidden; }
  .prog-bar-inner { height:100%; background:linear-gradient(90deg,var(--mint),var(--storm)); border-radius:4px; transition:width .4s ease; }
  /* Main content */
  .main { padding:32px 36px; max-width:900px; }
  /* Sprint header */
  .sprint-header { display:flex; align-items:flex-start; gap:20px; margin-bottom:28px; animation:fadeIn .3s ease both; }
  .sprint-icon { width:64px; height:64px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:30px; flex-shrink:0; }
  .sprint-header-info h2 { font-size:1.6rem; font-weight:800; letter-spacing:-.03em; margin-bottom:4px; }
  .sprint-header-info p { color:var(--text2); font-size:.9rem; }
  .sprint-week-tag { display:inline-flex; align-items:center; gap:6px; background:var(--bg2); border-radius:20px; padding:4px 12px; font-size:.72rem; font-weight:700; color:var(--text3); margin-bottom:8px; }
  /* Tab nav */
  .tab-nav { display:flex; gap:4px; background:var(--bg2); border-radius:12px; padding:4px; margin-bottom:28px; }
  .tab-btn { flex:1; padding:9px 0; border:none; background:transparent; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:.83rem; font-weight:600; color:var(--text3); cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .tab-btn.active { background:var(--card); color:var(--text); box-shadow:0 1px 6px rgba(0,0,0,.08); }
  /* Theory */
  .theory-grid { display:grid; gap:16px; }
  .theory-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(31,65,107,.06); transition:.2s; }
  .theory-card:hover { box-shadow:0 4px 16px rgba(31,65,107,.1); transform:translateY(-1px); }
  .theory-card-head { padding:16px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; }
  .theory-card-head h3 { font-size:.92rem; font-weight:700; flex:1; }
  .theory-card-body { padding:0 20px 16px; }
  .theory-content { font-size:.87rem; color:var(--text2); line-height:1.65; white-space:pre-wrap; }
  .theory-code { margin-top:12px; background:var(--code-bg); border-radius:10px; padding:14px 16px; font-family:'Fira Code',monospace; font-size:.78rem; color:#c9d1d9; line-height:1.7; white-space:pre; overflow-x:auto; }
  .theory-code .c-green  { color:#7ee787; }
  .theory-code .c-blue   { color:#79c0ff; }
  .theory-code .c-orange { color:#ffa657; }
  .theory-code .c-gray   { color:#8b949e; }
  .chevron { font-size:12px; color:var(--text3); transition:.2s; }
  .chevron.open { transform:rotate(180deg); }
  /* Quiz */
  .quiz-area { display:flex; flex-direction:column; gap:20px; }
  .quiz-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; box-shadow:0 2px 8px rgba(31,65,107,.06); position:relative; }
  .quiz-card.correct { border-color:var(--mint); background:rgba(60,180,151,.04); }
  .quiz-card.incorrect { border-color:var(--red-od); background:rgba(231,63,22,.04); }
  .quiz-num { font-size:.65rem; font-weight:700; letter-spacing:.08em; color:var(--text3); text-transform:uppercase; margin-bottom:8px; }
  .quiz-q { font-family:'Sora',sans-serif; font-size:.95rem; font-weight:600; margin-bottom:16px; line-height:1.45; }
  .quiz-q code { background:var(--bg2); border-radius:5px; padding:1px 6px; color:var(--storm); font-size:.88em; }
  .mc-options { display:grid; gap:8px; }
  .mc-option { padding:10px 14px; border-radius:9px; border:2px solid var(--border); background:var(--bg); font-family:'DM Sans',sans-serif; font-size:.85rem; cursor:pointer; text-align:left; transition:.15s; color:var(--text); display:flex; align-items:center; gap:10px; }
  .mc-option:hover:not(:disabled) { border-color:var(--storm); background:rgba(0,99,156,.06); }
  .mc-option.selected-correct { border-color:var(--mint); background:rgba(60,180,151,.1); color:var(--mint2); }
  .mc-option.selected-wrong   { border-color:var(--red-od); background:rgba(231,63,22,.08); color:var(--red-od); }
  .mc-option.reveal-correct   { border-color:var(--mint); background:rgba(60,180,151,.06); }
  .mc-option:disabled { cursor:default; }
  .fill-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .fill-prefix { font-family:'Fira Code',monospace; font-size:.85rem; color:var(--code-bg); background:var(--bg2); padding:8px 12px; border-radius:8px; white-space:nowrap; color:var(--text2); }
  .fill-input { font-family:'Fira Code',monospace; font-size:.9rem; border:2px solid var(--border); border-radius:8px; padding:8px 12px; background:var(--card); color:var(--text); width:140px; outline:none; transition:.15s; }
  .fill-input:focus { border-color:var(--storm); }
  .fill-input.correct { border-color:var(--mint); background:rgba(60,180,151,.08); }
  .fill-input.wrong   { border-color:var(--red-od); background:rgba(231,63,22,.06); }
  .check-btn { padding:8px 18px; background:var(--navy); color:#fff; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap; }
  .check-btn:hover:not(:disabled) { background:var(--storm); }
  .check-btn:disabled { opacity:.5; cursor:default; }
  .quiz-feedback { margin-top:10px; font-size:.8rem; font-weight:600; display:flex; align-items:center; gap:6px; }
  .quiz-feedback.ok  { color:var(--mint2); }
  .quiz-feedback.err { color:var(--red-od); }
  .xp-float { position:absolute; top:16px; right:16px; font-family:'Sora',sans-serif; font-size:.75rem; font-weight:700; color:var(--mint); background:rgba(60,180,151,.1); border-radius:10px; padding:3px 9px; display:flex; align-items:center; gap:4px; }
  .xp-gained { animation:xpPop .8s ease forwards; position:absolute; top:8px; right:60px; font-family:'Sora',sans-serif; font-weight:800; color:var(--mint); font-size:1.1rem; pointer-events:none; }
  /* Deliverables */
  .deliverable-list { display:flex; flex-direction:column; gap:10px; }
  .deliverable-item { display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 18px; cursor:pointer; transition:.15s; }
  .deliverable-item:hover { border-color:var(--storm); }
  .deliverable-item.checked { background:rgba(60,180,151,.06); border-color:var(--mint); }
  .check-circle { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; transition:.15s; }
  .deliverable-item.checked .check-circle { background:var(--mint); border-color:var(--mint); color:#fff; }
  .deliverable-text { font-size:.88rem; color:var(--text2); line-height:1.4; }
  .deliverable-item.checked .deliverable-text { color:var(--text3); text-decoration:line-through; }
  .deliv-xp-tag { margin-left:auto; font-size:.65rem; font-weight:700; color:var(--amber); background:rgba(217,119,6,.1); border-radius:8px; padding:3px 8px; white-space:nowrap; }
  /* Summary card */
  .summary-card { background:var(--navy); color:#fff; border-radius:16px; padding:24px; margin-top:28px; display:flex; align-items:center; gap:20px; }
  .summary-icon { font-size:36px; }
  .summary-info h3 { font-size:1rem; font-weight:700; margin-bottom:4px; }
  .summary-info p { font-size:.8rem; color:rgba(255,255,255,.6); }
  .summary-xp { margin-left:auto; text-align:right; }
  .summary-xp .val { font-family:'Sora',sans-serif; font-size:2rem; font-weight:800; color:var(--mint); }
  .summary-xp .lbl { font-size:.65rem; color:rgba(255,255,255,.5); }
  /* Overview */
  .overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .overview-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; cursor:pointer; transition:.2s; box-shadow:0 2px 8px rgba(31,65,107,.06); }
  .overview-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(31,65,107,.12); }
  .overview-card .oc-emoji { font-size:28px; margin-bottom:12px; }
  .overview-card .oc-week { font-size:.65rem; font-weight:700; letter-spacing:.08em; color:var(--text3); text-transform:uppercase; margin-bottom:4px; }
  .overview-card .oc-title { font-family:'Sora',sans-serif; font-size:1rem; font-weight:700; margin-bottom:8px; }
  .overview-card .oc-desc { font-size:.8rem; color:var(--text2); line-height:1.5; margin-bottom:14px; }
  .oc-prog { }
  .oc-prog-bar { height:5px; background:var(--bg2); border-radius:3px; overflow:hidden; margin-top:6px; }
  .oc-prog-inner { height:100%; border-radius:3px; transition:width .4s; }
  .oc-prog-label { font-size:.65rem; color:var(--text3); display:flex; justify-content:space-between; }
  /* Welcome */
  .welcome-hero { background:linear-gradient(135deg,var(--navy) 0%,var(--storm) 100%); border-radius:20px; padding:40px 36px; color:#fff; margin-bottom:32px; position:relative; overflow:hidden; }
  .welcome-hero::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; background:rgba(255,255,255,.04); border-radius:50%; }
  .welcome-hero::after { content:''; position:absolute; bottom:-60px; right:80px; width:150px; height:150px; background:rgba(60,180,151,.1); border-radius:50%; }
  .welcome-hero h2 { font-size:1.8rem; font-weight:800; margin-bottom:8px; }
  .welcome-hero p { color:rgba(255,255,255,.75); max-width:500px; line-height:1.6; font-size:.95rem; }
  .welcome-tags { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .welcome-tag { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:5px 14px; font-size:.75rem; font-weight:600; }
  @media(max-width:768px){
    .app-shell { grid-template-columns:1fr; }
    .sidebar { display:none; }
    .main { padding:20px 16px; }
  }
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ══════════════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════════════
const SPRINTS = [
  {
    id: 1,
    title: "De Fundering",
    subtitle: "Requirements & Samenwerking",
    emoji: "🗺️",
    color: "#3cb497",
    weeks: "Week 1–3",
    tagline: "Van klantvraag naar Product Backlog en Git-repository",
    theory: [
      {
        title: "Wat is een softwareproject?",
        icon: "💡",
        content: `Een softwareproject is het gestructureerd bouwen van een digitaal product — van een eerste idee tot een werkende applicatie die mensen echt gebruiken.

Elk softwareproject doorloopt dezelfde grote fases:

1. Requirements → Wat moet het product kunnen? Wat wil de klant?
2. Design → Hoe ziet het eruit? Hoe is de architectuur opgebouwd?
3. Development → Het effectief bouwen van de software
4. Testing → Controleren of alles correct en stabiel werkt
5. Deployment → Online zetten zodat gebruikers het kunnen gebruiken
6. Onderhoud → Bugs fixen, updates uitbrengen, uitbreiden

In dit project doorloop je al deze fases samen met je team, verdeeld over 5 sprints van telkens 3 weken.`,
        code: `// De grote lijn van jullie project
Week 1-3   → Requirements & Planning
Week 4-6   → Prototype bouwen
Week 7-9   → Testen & Verfijnen
Week 10-12 → MVP afwerken
Week 13-15 → Deployment & Presentatie`
      },
      {
        title: "Prototype vs. MVP vs. Eindproduct",
        icon: "🧱",
        content: `Tijdens het project bouw je stapsgewijs: eerst een prototype, dan een MVP, dan het eindproduct.

🔧 Prototype (Sprint 2):
Een ruwe, klikbare versie van je app — om ideeën te testen. Niet alles werkt perfect. Het doel: "Ziet dit eruit als wat de klant bedoelde?" Gebouwd met AI-hulp, snel en iteratief.

🚀 MVP — Minimum Viable Product (Sprint 4):
De kleinst mogelijke versie die echt werkt voor gebruikers. Alle kernfuncties zijn werkend en getest. Geen overbodige features — enkel wat noodzakelijk is.

✅ Eindproduct (Sprint 5):
Live beschikbaar via een publieke URL. Getest, gedocumenteerd, gepresenteerd.

Onthoud: een prototype is om te leren. Een MVP is om te leveren.`,
        code: `// Vergelijking
Prototype  → Snel, AI-gegenereerd, visueel
             Doel: valideren met klant
             "Klopt dit met uw verwachting?"

MVP        → Werkend, getest, stabiel
             Doel: echte gebruikers bedienen
             Kernfuncties 100% functioneel

Eindproduct → Live, gepresenteerd, ingediend`
      },
      {
        title: "Vragen stellen aan de opdrachtgever",
        icon: "🎙️",
        content: `De grootste fout in softwareprojecten: iets bouwen dat de klant niet bedoelde. Oorzaak: onvoldoende vragen gesteld aan het begin.

Waarom vragen stellen zo belangrijk is:
De klant denkt in problemen en wensen — niet in technische oplossingen. Jij moet die wensen omzetten naar concrete requirements. Dat lukt alleen door gerichte vragen.

Techniek — het klantinterview:
• Begin breed: "Vertel eens over uw huidige situatie. Wat werkt niet goed?"
• Graaf dieper: "Waarom is dat een probleem? Hoe vaak komt dit voor?"
• Concretiseer: "Wie gebruikt dit? Hoeveel mensen tegelijk?"
• Prioriteer: "Als u één ding kon veranderen, wat zou dat zijn?"
• Valideer: "Ik begrijp dat u X wilt — klopt dat?"

Gebruik ALTIJD open vragen (beginnen met Wie/Wat/Hoe/Waarom) — geen ja/nee-vragen!`,
        code: `// ❌ Slechte vragen
"Wilt u een loginpagina?"    → Ja/nee
"Moet het mobiel werken?"    → Ja/nee

// ✅ Goede vragen
"Wie gaat de app gebruiken en in welke situatie?"
"Hoe verloopt dat proces nu, zonder app?"
"Wat is het grootste knelpunt vandaag?"
"Hoe weet u dat de app succesvol is?"`
      },
      {
        title: "Requirements ophalen en documenteren",
        icon: "📋",
        content: `Requirements zijn de concrete beschrijvingen van wat het systeem moet doen en hoe het zich moet gedragen.

Twee soorten requirements:

Functionele requirements — wat het systeem DOET:
→ "De gebruiker kan inloggen met e-mail en wachtwoord"
→ "De beheerder kan producten toevoegen en verwijderen"
→ "Het systeem stuurt een bevestigingsmail na bestelling"

Niet-functionele requirements — hoe het systeem zich GEDRAAGT:
→ Snelheid: "De pagina laadt binnen 2 seconden"
→ Veiligheid: "Wachtwoorden worden gehashed opgeslagen"
→ Gebruiksvriendelijkheid: "Een nieuwe gebruiker vindt de bestelknop zonder uitleg"

Hoe documenteer je requirements?
Schrijf ze op als concrete, testbare zinnen — niet vaag! "Snel zijn" is geen requirement. "Laden in < 2 sec" is dat wel.`,
        code: `// Requirements document (basis)
Functioneel:
FR-01: Gebruiker kan registreren met e-mail

const LS_KEY = 'devflow_state_v1';
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
}

function TheoryCard({ card, accentColor }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="theory-card fade-in">
      <div className="theory-card-head" onClick={() => setOpen(o => !o)}
           style={{ borderLeft: open ? `4px solid ${accentColor}` : '4px solid transparent', paddingLeft: open ? 16 : 20, transition: '.2s' }}>
        <span style={{ fontSize: 20 }}>{card.icon}</span>
        <h3 style={{ flex: 1 }}>{card.title}</h3>
        <span className={`chevron${open ? ' open' : ''}`}>▼</span>
      </div>
      {open && (
        <div className="theory-card-body fade-in">
          <p className="theory-content">{card.content}</p>
          {card.code && (
            <div className="theory-code">
              {card.code.split('\n').map((line, i) => {
                const isComment = line.trim().startsWith('//') || line.trim().startsWith('#');
                const isGood = line.trim().startsWith('✅');
                const isBad = line.trim().startsWith('❌');
                return (
                  <div key={i} style={{ color: isComment ? '#8b949e' : isBad ? '#ff7b72' : isGood ? '#7ee787' : '#c9d1d9' }}>
                    {line}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function QuizQuestion({ q, idx, sprintId, saved, onAnswer, accentColor }) {
  const [selected, setSelected] = useState(saved?.selected ?? null);
  const [fillVal, setFillVal]   = useState(saved?.fill ?? '');
  const [checked, setChecked]   = useState(saved?.checked ?? false);
  const [showXp, setShowXp]     = useState(false);
  const answered = checked || selected !== null;
  const isCorrectMC = selected !== null && selected === q.answer;
  const isCorrectFill = checked && (() => {
    const v = fillVal.trim().toLowerCase();
    if (q.acceptAny) return v.length > 0;
    return q.answer.map(a => a.toLowerCase()).includes(v);
  })();

  const flashXP = () => { setShowXp(true); setTimeout(() => setShowXp(false), 900); };

  const handleMC = (i) => {
    if (answered) return;
    setSelected(i);
    const correct = i === q.answer;
    onAnswer(idx, { selected: i, checked: false }, correct ? q.xp : 0);
    if (correct) flashXP();
  };

  const handleCheck = () => {
    if (checked) return;
    setChecked(true);
    const v = fillVal.trim().toLowerCase();
    const correct = q.acceptAny ? v.length > 0 : q.answer.map(a => a.toLowerCase()).includes(v);
    onAnswer(idx, { fill: fillVal, checked: true }, correct ? q.xp : 0);
    if (correct) flashXP();
  };

  const cardClass = `quiz-card${q.type === 'mc' && selected !== null ? (isCorrectMC ? ' correct' : ' incorrect') : ''}${q.type === 'fill' && checked ? (isCorrectFill ? ' correct' : ' incorrect') : ''}`;

  return (
    <div className={cardClass}>
      {showXp && <div className="xp-gained">+{q.xp} XP ⚡</div>}
      <div className="xp-float">⚡ {q.xp} XP</div>
      <div className="quiz-num">Vraag {idx + 1}</div>
      <div className="quiz-q" dangerouslySetInnerHTML={{ __html: q.q.replace(/`([^`]+)`/g, '<code>$1</code>') }} />
      {q.type === 'mc' ? (
        <div className="mc-options">
          {q.options.map((opt, i) => {
            let cls = 'mc-option';
            if (selected !== null) {
              if (i === selected) cls += selected === q.answer ? ' selected-correct' : ' selected-wrong';
              else if (i === q.answer && selected !== q.answer) cls += ' reveal-correct';
            }
            return (
              <button key={i} className={cls} disabled={selected !== null} onClick={() => handleMC(i)}>
                <span style={{ width: 22, height: 22, borderRadius: '50%', border: '2px solid currentColor', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, flexShrink: 0 }}>
                  {['A','B','C','D'][i]}
                </span>
                {opt}
              </button>
            );
          })}
          {selected !== null && (
            <div className={`quiz-feedback ${isCorrectMC ? 'ok' : 'err'}`}>
              {isCorrectMC ? '✅ Correct!' : `❌ Fout — juist antwoord: ${q.options[q.answer]}`}
            </div>
          )}
        </div>
      ) : (
        <div>
          <div className="fill-row">
            {q.prefix && <span className="fill-prefix" style={{ background: '#1a2744', color: '#7dd3fc', borderRadius: 8, padding: '8px 12px' }}>{q.prefix}</span>}
            <input
              className={`fill-input${checked ? (isCorrectFill ? ' correct' : ' wrong') : ''}`}
              value={fillVal}
              onChange={e => setFillVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !checked && handleCheck()}
              disabled={checked}
              placeholder="???"
              style={{ width: Math.max(120, fillVal.length * 10 + 40) }}
            />
            {q.suffix && <span className="fill-prefix" style={{ background: '#1a2744', color: '#7dd3fc', borderRadius: 8, padding: '8px 12px' }}>{q.suffix}</span>}
            <button className="check-btn" onClick={handleCheck} disabled={checked || !fillVal.trim()}
              style={{ background: accentColor }}>
              Controleer
            </button>
          </div>
          {checked && (
            <div className={`quiz-feedback ${isCorrectFill ? 'ok' : 'err'}`}>
              {isCorrectFill ? '✅ Correct!' : `❌ Fout — juist antwoord: ${q.answer[0]}`}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DeliverableItem({ text, checked, onToggle, xp }) {
  return (
    <div className={`deliverable-item${checked ? ' checked' : ''}`} onClick={onToggle}>
      <div className="check-circle">{checked ? '✓' : ''}</div>
      <span className="deliverable-text">{text}</span>
      {!checked && <span className="deliv-xp-tag">+{xp} XP</span>}
    </div>
  );
}

function App() {
  const [state, setState] = useState(() => loadState());
  const [activeSprint, setActiveSprint] = useState(null); // null = overview
  const [tab, setTab] = useState('theory');

  useEffect(() => { saveState(state); }, [state]);

  // Compute XP
  const totalXP = SPRINTS.reduce((sum, sp) => {
    const qXP = sp.quiz.reduce((a, q, qi) => {
      const saved = state[`s${sp.id}_q${qi}`];
      if (!saved) return a;
      if (q.type === 'mc' && saved.selected === q.answer) return a + q.xp;
      if (q.type === 'fill' && saved.checked) {
        const v = saved.fill?.trim().toLowerCase() ?? '';
        const ok = q.acceptAny ? v.length > 0 : q.answer.map(a => a.toLowerCase()).includes(v);
        return ok ? a + q.xp : a;
      }
      return a;
    }, 0);
    const dXP = sp.deliverables.reduce((a, _, di) => a + (state[`s${sp.id}_d${di}`] ? 15 : 0), 0);
    return sum + qXP + dXP;
  }, 0);

  const sprintProgress = (sp) => {
    const qDone = sp.quiz.filter((q, qi) => {
      const saved = state[`s${sp.id}_q${qi}`];
      if (!saved) return false;
      if (q.type === 'mc') return saved.selected !== null && saved.selected !== undefined;
      return saved.checked;
    }).length;
    const dDone = sp.deliverables.filter((_, di) => state[`s${sp.id}_d${di}`]).length;
    const total = sp.quiz.length + sp.deliverables.length;
    return { done: qDone + dDone, total };
  };

  const handleQuizAnswer = (spId, qi, savedData, xpEarned) => {
    setState(s => ({ ...s, [`s${spId}_q${qi}`]: savedData }));
  };

  const handleDeliverable = (spId, di) => {
    const key = `s${spId}_d${di}`;
    setState(s => ({ ...s, [key]: !s[key] }));
  };

  const sprint = activeSprint !== null ? SPRINTS[activeSprint] : null;

  // Overview page
  if (activeSprint === null) {
    return (
      <div className="app-shell" style={{ gridTemplateColumns: '1fr' }}>

        {/* Main */}

          {[
            { key: 'theory', label: '📖 Theorie', count: sprint.theory.length },
            { key: 'quiz', label: '🧠 Quiz', count: `${sprint.quiz.reduce((a,q)=>a+q.xp,0)} XP` },
            { key: 'deliverables', label: '✅ Deliverables', count: sprint.deliverables.length }
          ].map(t => (
            <button key={t.key} className={`tab-btn${tab === t.key ? ' active' : ''}`} onClick={() => setTab(t.key)}>
              {t.label}
              <span style={{ background: tab === t.key ? sprint.color : 'var(--bg3)', color: tab === t.key ? '#fff' : 'var(--text3)', borderRadius: 10, padding: '1px 7px', fontSize: '.65rem', fontWeight: 700 }}>
                {t.count}
              </span>
            </button>
          ))}
        </div>

        {/* Theory tab */}
        {tab === 'theory' && (
          <div className="theory-grid fade-in">
            {sprint.theory.map((card, i) => (
              <TheoryCard key={i} card={card} accentColor={sprint.color} />
            ))}
          </div>
        )}

        {/* Quiz tab */}
        {tab === 'quiz' && (
          <div className="quiz-area fade-in">
            {sprint.quiz.map((q, qi) => (
              <QuizQuestion
                key={qi}
                q={q}
                idx={qi}
                sprintId={sprint.id}
                saved={state[`s${sprint.id}_q${qi}`]}
                onAnswer={(idx, data, xp) => setState(s => ({ ...s, [`s${sprint.id}_q${idx}`]: data }))}
                accentColor={sprint.color}
              />
            ))}
            <div className="summary-card">
              <div className="summary-icon">{sprint.emoji}</div>
              <div className="summary-info">
                <h3>Quiz voltooid?</h3>
                <p>Ga door naar de Deliverables om je sprint af te ronden.</p>
              </div>
              <div className="summary-xp">
                <div className="val">{sprint.quiz.reduce((a,q)=>a+q.xp,0)}</div>
                <div className="lbl">Max XP</div>
              </div>
            </div>
          </div>
        )}

        {/* Deliverables tab */}
        {tab === 'deliverables' && (
          <div className="fade-in">
            <div style={{ marginBottom: 16, padding: '14px 18px', background: `${sprint.color}15`, borderRadius: 12, borderLeft: `4px solid ${sprint.color}` }}>
              <p style={{ fontSize: '.85rem', color: 'var(--text2)', lineHeight: 1.5 }}>
                <strong>Deliverables</strong> zijn de concrete resultaten die je aan het einde van Sprint {sprint.id} moet kunnen tonen. Vink ze af als ze klaar zijn — elk levert <strong style={{ color: sprint.color }}>15 XP</strong> op.
              </p>
            </div>
            <div className="deliverable-list">
              {sprint.deliverables.map((d, di) => (
                <DeliverableItem
                  key={di}
                  text={d}
                  checked={!!state[`s${sprint.id}_d${di}`]}
                  onToggle={() => handleDeliverable(sprint.id, di)}
                  xp={15}
                />
              ))}
            </div>
            {sprint.deliverables.every((_, di) => state[`s${sprint.id}_d${di}`]) && (
              <div className="summary-card fade-in" style={{ marginTop: 24 }}>
                <div className="summary-icon">🎉</div>
                <div className="summary-info">
                  <h3>Sprint {sprint.id} volledig afgerond!</h3>
                  <p>Alle deliverables aangevinkt.
                    {activeSprint < SPRINTS.length - 1 && ' Ga door naar de volgende sprint!'}
                  </p>
                </div>
                {activeSprint < SPRINTS.length - 1 && (
                  <button onClick={() => { setActiveSprint(activeSprint + 1); setTab('theory'); }}
                    style={{ marginLeft: 'auto', background: sprint.color, color: '#fff', border: 'none', borderRadius: 10, padding: '10px 20px', fontFamily: 'DM Sans', fontWeight: 700, cursor: 'pointer', fontSize: '.85rem', whiteSpace: 'nowrap' }}>
                    Sprint {sprint.id + 1} →
                  </button>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
